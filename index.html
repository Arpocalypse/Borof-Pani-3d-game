<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>বরফ পানি — Borof Pani</title>
<!--
  ═══════════════════════════════════════════════════════════════════════
  BOROF PANI (বরফ পানি) — Gameplay Build v0.6.0
  A 3D browser game inspired by the traditional Bangladeshi tag game.

  This is the single-file build. In the repository it splits into the
  following structure — every class below is annotated with its file path:

  borof-pani/
  ├── index.html
  ├── assets/                     (models, textures, audio — procedural for now)
  └── src/
      ├── main.js                 Boot entry point
      ├── config/
      │   └── GameConfig.js       Central tunables + live settings
      ├── localization/
      │   ├── LocalizationManager.js  Singleton: t(), bind(), persistence
      │   ├── en.js               English (default)
      │   ├── bn.js               বাংলা
      │   └── ko.js               한국어
      ├── core/
      │   ├── EventBus.js         Pub/sub backbone (decouples all managers)
      │   ├── GameLoop.js         Fixed-timestep update + render loop
      │   ├── InputManager.js     Keyboard + pointer-lock mouse state
      │   └── Game.js             Composition root — owns every manager
      ├── managers/
      │   ├── GameStateManager.js Finite state machine w/ transition table
      │   ├── AssetLoader.js      Manifest-driven loader w/ progress events
      │   ├── SceneManager.js     Renderer, scene graph, resize, quality
      │   ├── LightingSystem.js   Dusk lighting rig, shadow quality tiers
      │   ├── EnvironmentManager.js  Courtyard, trees, fence, sky, fireflies
      │   ├── CameraController.js Mode-based camera (menu orbit / follow*)
      │   ├── AudioManager.js     WebAudio buses: master → music / sfx
      │   ├── UIManager.js        Screen registry, state-driven transitions
      │   ├── PlayerManager.js    Roster factory (human + bots)
      │   ├── PlayerController.js Third-person locomotion + camera feed
      │   ├── AIManager.js        Runner/Catcher brains + separation pass
      │   └── GameManager.js      High-level match orchestration
      ├── systems/
      │   ├── FreezeSystem.js     Frozen-state ledger + ice shell material
      │   ├── LotterySystem.js    Chor selection (random / counting rhyme)
      │   ├── CollisionSystem.js  Player push-out + camera occlusion
      │   └── RoundSystem.js      Match rules: clock, touches, win logic
      ├── entities/
      │   └── PlayerAvatar.js     Procedural rig with pose blending
      ├── ai/
      │   ├── Steering.js         Wall field, obstacle probe, separation
      │   ├── BotBody.js          Bot locomotion (player-identical feel)
      │   ├── RunnerAI.js         FSM: Idle · Wander · Escape · Rescue
      │   └── CatcherAI.js        FSM: Search · Chase · Intercept
      └── ui/screens/
          ├── Screen.js           Base class (build / enter / exit)
          ├── LoadingScreen.js
          ├── MainMenuScreen.js
          ├── SettingsScreen.js
          ├── PlayerCountScreen.js
          ├── HUDScreen.js
          ├── PauseScreen.js
          ├── LotteryScreen.js
          └── EndScreen.js

  (*) marked systems expose their full API now; their per-frame behavior
      activates in the gameplay build.
  ═══════════════════════════════════════════════════════════════════════
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Galada&family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
/* ─────────────────────────────────────────────────────────────
   DESIGN TOKENS — dusk courtyard, ice vs water
   ───────────────────────────────────────────────────────────── */
:root {
  --dusk:      #0e1d1c;   /* evening green-black (UI base)        */
  --dusk-2:    #16302e;   /* raised panels                        */
  --dusk-line: #274b48;   /* hairlines, borders                   */
  --ice:       #c9f0f4;   /* বরফ — pale ice cyan (headings)       */
  --ice-dim:   #8fc4cc;
  --pani:      #37a39b;   /* পানি — water teal (interactive)      */
  --pani-deep: #1f6b66;
  --marigold:  #e8a33d;   /* গাঁদা — highlights, selection        */
  --cloth:     #f1e9d6;   /* body text, like cotton gamcha        */
  --cloth-dim: #b9b3a2;
  --clay:      #9c5636;   /* courtyard earth (sparse)             */

  --font-display: 'Galada', 'Hind Siliguri', cursive;
  --font-ui: 'Hind Siliguri', 'Noto Sans Bengali', system-ui, sans-serif;
  --font-meta: ui-monospace, 'SF Mono', Menlo, monospace;

  --ease-out: cubic-bezier(.22, 1, .36, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--dusk);
  color: var(--cloth);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}

/* ── Canvas layer ── */
#game-canvas-host { position: fixed; inset: 0; z-index: 0; }
#game-canvas-host canvas { display: block; }

/* ── UI layer ── */
#ui-root { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

.screen {
  position: absolute; inset: 0;
  display: flex;
  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  transition: opacity .45s var(--ease-out),
              transform .45s var(--ease-out),
              visibility 0s linear .45s;
  pointer-events: none;
}
.screen.is-active {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  transition: opacity .45s var(--ease-out),
              transform .45s var(--ease-out),
              visibility 0s linear 0s;
  pointer-events: auto;
}
@media (prefers-reduced-motion: reduce) {
  .screen, .screen.is-active { transition: opacity .2s linear; transform: none; }
}

/* ─────────────────────────────────────────────────────────────
   SIGNATURE — the split-state title: বরফ frozen, পানি liquid
   ───────────────────────────────────────────────────────────── */
.title-lockup { user-select: none; line-height: .95; }
.title-lockup .t-borof,
.title-lockup .t-pani {
  display: block;
  font-family: var(--font-display);
  font-weight: 400;
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}
.title-lockup .t-borof {
  font-size: clamp(3.4rem, 9vw, 6.5rem);
  letter-spacing: .06em;                       /* crystalline spread */
  background-image: linear-gradient(175deg, #ffffff 0%, var(--ice) 45%, #6fb3bd 100%);
  text-shadow: 0 0 24px rgba(201, 240, 244, .0); /* kept 0 so bg-clip stays clean */
  filter: drop-shadow(0 2px 14px rgba(160, 225, 235, .35));
}
.title-lockup .t-pani {
  font-size: clamp(3.4rem, 9vw, 6.5rem);
  margin-top: .04em;
  letter-spacing: 0;                           /* liquid, flowing */
  background-image: linear-gradient(95deg, #55c2b9 0%, var(--pani) 40%, #1c7a73 100%);
  filter: drop-shadow(0 6px 16px rgba(31, 107, 102, .45));
}
.title-lockup .t-latin {
  display: block;
  margin-top: .9rem;
  font-family: var(--font-meta);
  font-size: .72rem;
  letter-spacing: .38em;
  text-transform: uppercase;
  color: var(--cloth-dim);
}

/* ─────────────────────────────────────────────────────────────
   LOADING SCREEN
   ───────────────────────────────────────────────────────────── */
#screen-loading {
  background: radial-gradient(120% 90% at 50% 10%, #14302e 0%, var(--dusk) 62%);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3rem;
  text-align: center;
}
.load-bar-wrap { width: min(420px, 72vw); }
.load-bar {
  position: relative;
  height: 14px;
  border: 1px solid var(--dusk-line);
  border-radius: 3px;
  background: rgba(255, 255, 255, .03);
  overflow: hidden;
}
.load-bar-fill {
  position: absolute; inset: 0;
  width: 0%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--pani-deep), var(--pani) 55%, var(--ice));
  transition: width .25s var(--ease-out);
}
.load-bar-fill::after {                        /* melt sheen on the leading edge */
  content: '';
  position: absolute; top: 0; right: 0;
  width: 22px; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.55));
}
.load-drip {                                    /* the drop that falls as ice melts */
  position: absolute;
  top: 18px;
  width: 5px; height: 8px;
  border-radius: 50% 50% 60% 60%;
  background: var(--ice);
  opacity: 0;
}
@keyframes drip-fall {
  0%   { opacity: .9; transform: translateY(0) scaleY(1); }
  80%  { opacity: .9; }
  100% { opacity: 0;  transform: translateY(26px) scaleY(1.4); }
}
@media (prefers-reduced-motion: reduce) { .load-drip { display: none; } }
.load-status {
  margin-top: 1.1rem;
  font-family: var(--font-meta);
  font-size: .7rem;
  letter-spacing: .16em;
  color: var(--ice-dim);
  min-height: 1.2em;
}
.load-tip {
  max-width: 46ch;
  font-size: .92rem;
  font-weight: 300;
  color: var(--cloth-dim);
}
.load-tip strong { color: var(--marigold); font-weight: 600; }

/* ─────────────────────────────────────────────────────────────
   MENU-STYLE SCREENS (main menu / settings / player count)
   left rail over the live courtyard
   ───────────────────────────────────────────────────────────── */
.rail {
  width: min(460px, 92vw);
  height: 100%;
  padding: clamp(1.6rem, 4vh, 3.2rem) clamp(1.4rem, 3.4vw, 3rem);
  display: flex;
  flex-direction: column;
  background: linear-gradient(90deg,
              rgba(10, 22, 21, .92) 0%,
              rgba(10, 22, 21, .82) 70%,
              rgba(10, 22, 21, 0) 100%);
}
.rail-head { margin-bottom: auto; }
.rail-body { display: flex; flex-direction: column; gap: .7rem; }
/* Settings has grown the tallest of the rail screens (language selector +
   6 controls + back button) — give it room to scroll internally instead of
   letting later controls (including Back) get clipped off short viewports.
   Scoped to Settings only so other rail screens keep their exact layout. */
#screen-settings .rail-body {
  overflow-y: auto; overflow-x: hidden;
  flex: 1 1 auto; min-height: 0;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--pani-deep) transparent;
}
#screen-settings .rail-body::-webkit-scrollbar { width: 6px; }
#screen-settings .rail-body::-webkit-scrollbar-thumb { background: var(--pani-deep); border-radius: 3px; }
.rail-foot {
  margin-top: auto;
  padding-top: 1.6rem;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--font-meta);
  font-size: .64rem;
  letter-spacing: .14em;
  color: var(--cloth-dim);
}

.rail .title-lockup .t-borof,
.rail .title-lockup .t-pani { font-size: clamp(2.6rem, 5vw, 4rem); }

.eyebrow {
  font-family: var(--font-meta);
  font-size: .68rem;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--marigold);
  margin-bottom: 1.2rem;
}

/* ── Buttons ── */
.btn {
  appearance: none;
  border: 1px solid var(--dusk-line);
  background: rgba(22, 48, 46, .55);
  color: var(--cloth);
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: 500;
  text-align: left;
  padding: .85rem 1.15rem;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 1rem;
  transition: border-color .18s, background .18s, transform .18s var(--ease-out);
}
.btn .bn { font-size: .8rem; color: var(--ice-dim); font-weight: 400; }
.btn:hover, .btn:focus-visible {
  border-color: var(--pani);
  background: rgba(55, 163, 155, .16);
  transform: translateX(4px);
}
.btn:focus-visible { outline: 2px solid var(--ice); outline-offset: 2px; }
.btn:active { transform: translateX(4px) scale(.99); }
.btn[disabled] { opacity: .38; cursor: not-allowed; transform: none; }
.btn--primary {
  border-color: var(--pani);
  background: linear-gradient(90deg, rgba(55,163,155,.28), rgba(55,163,155,.10));
}
.btn--primary:hover, .btn--primary:focus-visible {
  background: linear-gradient(90deg, rgba(55,163,155,.42), rgba(55,163,155,.18));
}
.btn--ghost { border-color: transparent; background: transparent; color: var(--cloth-dim); }
.btn--ghost:hover, .btn--ghost:focus-visible { color: var(--cloth); background: rgba(255,255,255,.04); }

/* ── Rules panel (main menu) ── */
.rules {
  margin-top: 1.2rem;
  border-top: 1px solid var(--dusk-line);
  padding-top: 1rem;
  font-size: .84rem;
  font-weight: 300;
  color: var(--cloth-dim);
  line-height: 1.55;
}
.rules dt {
  float: left;
  clear: left;
  margin-right: .5em;
  font-weight: 600;
  color: var(--ice);
}
.rules dt.dt-pani { color: var(--pani); }
.rules dt.dt-chor { color: var(--marigold); }
.rules dd { margin-bottom: .35rem; }

/* ── Settings controls ── */
.setting { display: flex; flex-direction: column; gap: .45rem; padding: .55rem 0; }
.setting + .setting { border-top: 1px solid rgba(39, 75, 72, .5); }
.setting-label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: .92rem; font-weight: 500;
}
.setting-label .val {
  font-family: var(--font-meta);
  font-size: .7rem;
  color: var(--ice-dim);
  letter-spacing: .08em;
}
input[type="range"] {
  appearance: none;
  width: 100%; height: 4px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--pani) var(--fill, 50%), var(--dusk-line) var(--fill, 50%));
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--ice);
  border: 2px solid var(--pani-deep);
}
input[type="range"]::-moz-range-thumb {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--ice);
  border: 2px solid var(--pani-deep);
}
input[type="range"]:focus-visible { outline: 2px solid var(--ice); outline-offset: 4px; }

.seg { display: flex; gap: .4rem; }
.seg button {
  flex: 1;
  border: 1px solid var(--dusk-line);
  background: transparent;
  color: var(--cloth-dim);
  font-family: var(--font-ui);
  font-size: .84rem;
  padding: .45rem 0;
  border-radius: 4px;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
}
.seg button:hover { border-color: var(--pani); color: var(--cloth); }
.seg button:focus-visible { outline: 2px solid var(--ice); outline-offset: 2px; }
.seg button.is-on {
  border-color: var(--marigold);
  color: var(--marigold);
  background: rgba(232, 163, 61, .09);
}

/* ── localization ── */
html[lang="ko"] {                       /* Korean glyphs get a proper face */
  --font-ui: 'Noto Sans KR', 'Hind Siliguri', system-ui, sans-serif;
}
.seg--lang { flex-direction: column; gap: .35rem; }
.seg--lang button {
  text-align: left;
  padding: .5rem .8rem;
  font-size: .95rem;
}

/* ── Player count cards ── */
.count-grid { display: flex; gap: .7rem; margin: .3rem 0 1rem; }
.count-card {
  flex: 1;
  border: 1px solid var(--dusk-line);
  background: rgba(22, 48, 46, .55);
  border-radius: 6px;
  padding: 1.1rem .6rem 1rem;
  text-align: center;
  color: var(--cloth);
  font-family: var(--font-ui);
  cursor: pointer;
  transition: border-color .18s, background .18s, transform .18s var(--ease-out);
}
.count-card:hover, .count-card:focus-visible { border-color: var(--pani); transform: translateY(-3px); }
.count-card:focus-visible { outline: 2px solid var(--ice); outline-offset: 2px; }
.count-card.is-on {
  border-color: var(--marigold);
  background: rgba(232, 163, 61, .10);
  transform: translateY(-3px);
}
.count-card .num {
  display: block;
  font-family: var(--font-display);
  font-size: 2.6rem;
  line-height: 1;
  color: var(--ice);
}
.count-card.is-on .num { color: var(--marigold); }
.count-card .sub {
  display: block;
  margin-top: .5rem;
  font-size: .72rem;
  color: var(--cloth-dim);
}

/* ── Match-ready panel (post-selection, pre-gameplay) ── */
.match-panel {
  margin-top: .4rem;
  border: 1px solid var(--dusk-line);
  border-left: 3px solid var(--marigold);
  border-radius: 4px;
  background: rgba(22, 48, 46, .6);
  padding: .9rem 1rem;
  font-size: .86rem;
  line-height: 1.5;
}
.match-panel .chor-line { color: var(--marigold); font-weight: 600; }
.roster-chips { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .55rem; }
.roster-chips span {
  display: inline-flex; align-items: center; gap: .35em;
  border: 1px solid var(--dusk-line);
  border-radius: 999px;
  padding: .12rem .6rem .16rem;
  font-size: .74rem;
  color: var(--cloth-dim);
}
.roster-chips span i {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--dot, var(--pani));
}
.roster-chips span.is-chor { border-color: var(--marigold); color: var(--marigold); }
.roster-chips span.is-you { color: var(--ice); }
.match-note { margin-top: .6rem; font-size: .74rem; color: var(--cloth-dim); font-style: italic; }

/* ── HUD (PLAYING) + pause overlay (PAUSED) ── */
#screen-hud { align-items: flex-end; justify-content: center; }
#screen-hud.is-active { pointer-events: none; }      /* never eats mouse look */
.hud-hint {
  margin-bottom: 20px;
  background: rgba(10, 22, 21, .72);
  border: 1px solid var(--dusk-line);
  border-radius: 999px;
  padding: .45rem 1.15rem;
  font-size: .78rem;
  letter-spacing: .05em;
  color: var(--cloth-dim);
}
#screen-pause {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.4rem;
  background: radial-gradient(60% 60% at 50% 45%,
              rgba(10, 22, 21, .74), rgba(10, 22, 21, .9));
}
.pause-title {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 2.1rem;
  letter-spacing: .12em;
  color: var(--ice);
}
.pause-panel { display: flex; flex-direction: column; gap: .7rem; width: min(300px, 82vw); }

/* ── match HUD stats ── */
.hud-top {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: .6rem;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 94vw;
}
.hud-cell {
  display: flex; align-items: baseline; gap: .5rem;
  background: rgba(10, 22, 21, .72);
  border: 1px solid var(--dusk-line);
  border-radius: 6px;
  padding: .35rem .8rem;
}
.hud-label {
  font-family: var(--font-meta);
  font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--cloth-dim);
}
.hud-value { font-size: 1.02rem; font-weight: 600; color: var(--ice); }

/* ── lottery ceremony ── */
#screen-lottery {
  align-items: center; justify-content: center;
  background: radial-gradient(70% 65% at 50% 42%,
              rgba(10, 22, 21, .55), rgba(10, 22, 21, .78));
}
#screen-lottery.is-active { pointer-events: none; }  /* no buttons here — let clicks reach the canvas */
.lot-col {
  display: flex; flex-direction: column; align-items: center;
  gap: 1.1rem; text-align: center; padding: 1rem;
}
.lot-rhyme {
  font-family: var(--font-meta);
  font-size: .78rem; letter-spacing: .26em;
  color: var(--marigold);
}
.lot-chips { justify-content: center; max-width: 560px; }
.roster-chips span.is-out { opacity: .3; text-decoration: line-through; }
.lot-line { font-size: 1.55rem; font-weight: 700; color: var(--ice); min-height: 2.2rem; }
.lot-count {
  font-family: var(--font-display);
  font-size: 4.6rem; line-height: 1;
  color: var(--marigold);
  min-height: 5rem;
  filter: drop-shadow(0 4px 18px rgba(232, 163, 61, .35));
}

/* ── end of match ── */
#screen-end {
  flex-direction: column; align-items: center; justify-content: center;
  gap: .9rem;
  background: radial-gradient(60% 60% at 50% 45%,
              rgba(10, 22, 21, .78), rgba(10, 22, 21, .92));
}
#screen-end .eyebrow { margin-bottom: 0; }
.end-title { font-weight: 700; font-size: 2.7rem; letter-spacing: .06em; }
.end-title.win { color: var(--ice); filter: drop-shadow(0 3px 20px rgba(201, 240, 244, .4)); }
.end-title.lose { color: var(--marigold); }
.end-side { font-size: 1.05rem; color: var(--cloth); }
.end-chor { font-size: .85rem; color: var(--cloth-dim); margin-bottom: 1rem; }

/* ── FPS meter (settings toggleable) ── */
#fps-meter {
  position: fixed; top: 10px; right: 12px; z-index: 20;
  font-family: var(--font-meta); font-size: .66rem; letter-spacing: .1em;
  color: var(--ice-dim);
  background: rgba(10, 22, 21, .6);
  border: 1px solid var(--dusk-line);
  border-radius: 3px;
  padding: .2rem .5rem;
  display: none;
  pointer-events: none;
}
#fps-meter.is-visible { display: block; }
</style>
</head>
<body>
<div id="game-canvas-host"></div>
<div id="ui-root"></div>
<div id="fps-meter">-- FPS</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* ════════════════════════════════════════════════════════════
   src/config/GameConfig.js
   Central tunables. `settings` is the live, user-mutable slice
   (kept in memory for this build; persistence layer comes later).
