/* ════════════════════════════════════════════════════════════
   src/core/EventBus.js
   Minimal pub/sub. Every manager talks through this — no manager
   holds a hard reference to another manager's internals.
   ════════════════════════════════════════════════════════════ */
class EventBus {
  constructor() { this._listeners = new Map(); }

  on(event, handler) {
    if (!this._listeners.has(event)) this._listeners.set(event, new Set());
    this._listeners.get(event).add(handler);
    return () => this.off(event, handler);   // returns an unsubscribe fn
  }

  once(event, handler) {
    const off = this.on(event, (payload) => { off(); handler(payload); });
    return off;
  }

  off(event, handler) {
    const set = this._listeners.get(event);
    if (set) set.delete(handler);
  }

  emit(event, payload) {
    const set = this._listeners.get(event);
    if (!set) return;
    for (const handler of [...set]) {
      try { handler(payload); }
      catch (err) { console.error(`[EventBus] handler for "${event}" threw:`, err); }
    }
  }
}

/* ════════════════════════════════════════════════════════════
   src/managers/GameStateManager.js
   Finite state machine with an explicit transition table.
   Illegal transitions are rejected loudly in dev, silently no-op
   in production flow.
   ════════════════════════════════════════════════════════════ */
const GameState = Object.freeze({
  BOOT:          'BOOT',
  LOADING:       'LOADING',
  MAIN_MENU:     'MAIN_MENU',
  SETTINGS:      'SETTINGS',
  PLAYER_SELECT: 'PLAYER_SELECT',
  MATCH_SETUP:   'MATCH_SETUP',
  // ── reserved for the gameplay build ──
  LOTTERY:       'LOTTERY',
  PLAYING:       'PLAYING',
  PAUSED:        'PAUSED',
  ROUND_END:     'ROUND_END',
});

class GameStateManager {
  constructor(bus) {
    this.bus = bus;
    this.current = GameState.BOOT;
    this.previous = null;

    this._transitions = {
      [GameState.BOOT]:          [GameState.LOADING],
      [GameState.LOADING]:       [GameState.MAIN_MENU],
      [GameState.MAIN_MENU]:     [GameState.SETTINGS, GameState.PLAYER_SELECT],
      [GameState.SETTINGS]:      [GameState.MAIN_MENU],
      [GameState.PLAYER_SELECT]: [GameState.MAIN_MENU, GameState.MATCH_SETUP],
      [GameState.MATCH_SETUP]:   [GameState.MAIN_MENU, GameState.PLAYER_SELECT, GameState.LOTTERY],
      // gameplay-build transitions, declared now so the table is complete:
      [GameState.LOTTERY]:       [GameState.PLAYING],
      [GameState.PLAYING]:       [GameState.PAUSED, GameState.ROUND_END],
      [GameState.PAUSED]:        [GameState.PLAYING, GameState.MAIN_MENU],
      [GameState.ROUND_END]:     [GameState.MAIN_MENU, GameState.LOTTERY],
    };
  }

  canTransition(to) {
    return (this._transitions[this.current] || []).includes(to);
  }

  setState(to, payload = {}) {
    if (to === this.current) return false;
    if (!this.canTransition(to)) {
      console.warn(`[GameState] blocked: ${this.current} → ${to}`);
      return false;
    }
    this.previous = this.current;
    this.current = to;
    this.bus.emit('state:changed', { from: this.previous, to, payload });
    return true;
  }

  is(state) { return this.current === state; }
}

/* ════════════════════════════════════════════════════════════
   src/managers/AssetLoader.js
   Manifest-driven. Each entry is a named build task; today every
   asset is procedural (geometry, materials, audio graphs), so a
   task is an async factory. When GLTF/texture files arrive, they
   register as tasks of kind 'gltf'/'texture' with zero API change.
   Emits: assets:progress {ratio, label}, assets:done
   ════════════════════════════════════════════════════════════ */
class AssetLoader {
  constructor(bus) {
    this.bus = bus;
    this._registry = new Map();
    this._manifest = [];
  }

  register(id, label, factory) {
    this._manifest.push({ id, label, factory });
  }

  get(id) {
    if (!this._registry.has(id)) throw new Error(`[AssetLoader] missing asset "${id}"`);
    return this._registry.get(id);
  }

  has(id) { return this._registry.has(id); }

  async loadAll() {
    const total = this._manifest.length;
    for (let i = 0; i < total; i++) {
      const { id, label, factory } = this._manifest[i];
      this.bus.emit('assets:progress', { ratio: i / total, label });
      const asset = await factory();
      this._registry.set(id, asset);
      // yield a frame so the loading bar visibly advances
      await new Promise(requestAnimationFrame);
    }
    this.bus.emit('assets:progress', { ratio: 1, label: L10N.t('ready') });
    this.bus.emit('assets:done');
  }

  dispose(id) {
    const asset = this._registry.get(id);
    if (asset && asset.dispose) asset.dispose();
    this._registry.delete(id);
  }
}

/* ════════════════════════════════════════════════════════════
   src/managers/SceneManager.js
   Owns renderer + root scene. Applies graphics quality tiers and
   handles resize. Nothing else touches the WebGLRenderer directly.
   ════════════════════════════════════════════════════════════ */
class SceneManager {
  constructor(bus, hostEl) {
    this.bus = bus;
    this.hostEl = hostEl;

    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.Fog(
      GameConfig.world.fogColor, GameConfig.world.fogNear, GameConfig.world.fogFar);

    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.outputEncoding = THREE.sRGBEncoding;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    hostEl.appendChild(this.renderer.domElement);

    this.applyQuality(GameConfig.settings.graphicsQuality);
    this._onResize = this._onResize.bind(this);
    window.addEventListener('resize', this._onResize);
    this._onResize();

    bus.on('settings:graphics', (tier) => this.applyQuality(tier));
  }

  applyQuality(tierName) {
    const tier = GameConfig.qualityTiers[tierName] || GameConfig.qualityTiers.medium;
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, tier.pixelRatioCap));
    this.renderer.shadowMap.enabled = tier.shadows;
    this.bus.emit('quality:applied', tier);
  }

  _onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    this.renderer.setSize(w, h);
    this.bus.emit('viewport:resized', { width: w, height: h, aspect: w / h });
  }

  add(obj) { this.scene.add(obj); }
  remove(obj) { this.scene.remove(obj); }

  render(camera) { this.renderer.render(this.scene, camera); }
}

/* ════════════════════════════════════════════════════════════
   src/managers/LightingSystem.js
   Sunny rig: hemisphere (blue sky / green ground bounce) + a
   high late-morning sun with shadows, + a faint cool sky fill
   from the opposite side so shaded faces never go pure black.
   ════════════════════════════════════════════════════════════ */
class LightingSystem {
  constructor(bus, sceneManager) {
    this.bus = bus;
    this.sceneManager = sceneManager;
    this.group = new THREE.Group();
    this.group.name = 'LightingRig';

    this.hemi = new THREE.HemisphereLight(0xbfdcec, 0x6f9a4d, 0.95);

    this.sun = new THREE.DirectionalLight(0xfff3da, 1.3);
    this.sun.position.set(45, 70, 25);          // high late-morning sun
    this.sun.castShadow = true;
    this.sun.shadow.camera.left = -55;          // covers the whole compound
    this.sun.shadow.camera.right = 55;
    this.sun.shadow.camera.top = 55;
    this.sun.shadow.camera.bottom = -55;
    this.sun.shadow.camera.far = 170;
    this.sun.shadow.bias = -0.0015;
    this.sun.shadow.camera.updateProjectionMatrix();

    this.moonFill = new THREE.DirectionalLight(0xa8c8e8, 0.25);   // cool sky fill
    this.moonFill.position.set(-30, 25, -20);

    this.group.add(this.hemi, this.sun, this.sun.target, this.moonFill);
    sceneManager.add(this.group);

    bus.on('quality:applied', (tier) => this._applyShadowTier(tier));
    this._applyShadowTier(
      GameConfig.qualityTiers[GameConfig.settings.graphicsQuality]);
  }

  _applyShadowTier(tier) {
    this.sun.castShadow = tier.shadows;
    this.sun.shadow.mapSize.set(tier.shadowMapSize, tier.shadowMapSize);
    if (this.sun.shadow.map) {                  // force re-allocation at new size
      this.sun.shadow.map.dispose();
      this.sun.shadow.map = null;
    }
  }
}
</script>
<script>
/* ════════════════════════════════════════════════════════════
   src/managers/EnvironmentManager.js                    (v0.2.0)
   A sunny Bangladeshi government primary school compound:
   the classic yellow-and-maroon school building with a tin roof
   and verandah, an earthen play-yard (the borof-pani circle), a
   marked football field with goals, a brick boundary wall with a
   south gate, benches, swings / seesaw / slide, krishnachura and
   coconut palms, drifting clouds, circling birds — all driven by
   one shared wind model. Everything is procedural and registered
   through the AssetLoader; swapping in modeled assets later
   touches only the manifest.
   ════════════════════════════════════════════════════════════ */
class EnvironmentManager {
  constructor(bus, sceneManager, assets) {
    this.bus = bus;
    this.sceneManager = sceneManager;
    this.assets = assets;
    this.group = new THREE.Group();
    this.group.name = 'Environment';
    this._time = 0;

    // wind-driven actors, collected while assets build
    this._sway = { canopies: [], grass: [], swings: [] };
    this._seesawPlank = null;
    this._clouds = [];
    this._birds = [];
    this._flagUniforms = null;

    // deterministic scatter so the yard looks identical every boot
    this._seed = 20260721;
  }

  /* seeded rand — layout is art direction, not dice */
  _rand() { this._seed = (this._seed * 16807) % 2147483647; return this._seed / 2147483647; }

  /* Current wind gust in 0..1 — one model shared by trees, grass,
     swings, clouds, and the flag (and, later, gameplay ambience). */
  windGust(t = this._time) {
    return THREE.MathUtils.clamp(
      0.45 + 0.30 * Math.sin(t * 0.45)
           + 0.18 * Math.sin(t * 1.31 + 1.7)
           + 0.07 * Math.sin(t * 3.70 + 0.4), 0, 1);
  }

  registerAssets() {
    const A = this.assets;
    A.register('env:sky',        'আকাশ · sunny sky',              async () => this._buildSky());
    A.register('env:terrain',    'মাঠঘাট · terrain',              async () => this._buildTerrain());
    A.register('env:boundary',   'খেলার গণ্ডি · play circle',      async () => this._buildPlayCircle());
    A.register('env:field',      'ফুটবল মাঠ · football field',     async () => this._buildField());
    A.register('env:school',     'বিদ্যালয় ভবন · school building', async () => this._buildSchool());
    A.register('env:wall',       'সীমানা প্রাচীর · boundary wall',  async () => this._buildWall());
    A.register('env:playground', 'দোলনা-চরকি · play equipment',    async () => this._buildPlayground());
    A.register('env:benches',    'বেঞ্চ · benches',                async () => this._buildBenches());
    A.register('env:trees',      'গাছপালা · trees',                async () => this._buildTrees());
    A.register('env:grass',      'ঘাস · grass tufts',              async () => this._buildGrassTufts());
    A.register('env:clouds',     'মেঘ · clouds',                   async () => this._buildClouds());
    A.register('env:birds',      'পাখি · birds',                   async () => this._buildBirds());
  }

  build() {
    for (const id of ['env:sky', 'env:terrain', 'env:boundary', 'env:field',
                      'env:school', 'env:wall', 'env:playground', 'env:benches',
                      'env:trees', 'env:grass', 'env:clouds', 'env:birds']) {
      this.group.add(this.assets.get(id));
    }
    this.sceneManager.add(this.group);
  }

  /* ── sky ──────────────────────────────────────────────────── */

  _buildSky() {
    const geo = new THREE.SphereGeometry(200, 24, 16);
    const mat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      depthWrite: false,
      uniforms: {
        topColor:     { value: new THREE.Color(0x2f7cc4) },
        horizonColor: { value: new THREE.Color(0xd7ecf2) },   // matches the fog haze
        sunDir:       { value: new THREE.Vector3(45, 70, 25).normalize() },
      },
      vertexShader: `
        varying vec3 vDir;
        void main() {
          vDir = normalize(position);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        uniform vec3 topColor, horizonColor, sunDir;
        varying vec3 vDir;
        void main() {
          float h = clamp(vDir.y, 0.0, 1.0);
          vec3 col = mix(horizonColor, topColor, pow(h, 0.6));
          float s = max(dot(normalize(vDir), sunDir), 0.0);
          col += vec3(1.0, 0.98, 0.90) * pow(s, 220.0) * 1.4;   // sun disc
          col += vec3(1.0, 0.95, 0.80) * pow(s, 10.0) * 0.16;   // wide halo
          gl_FragColor = vec4(col, 1.0);
        }`,
    });
    return new THREE.Mesh(geo, mat);
  }

  /* ── terrain ──────────────────────────────────────────────── */

  _buildTerrain() {
    const geo = new THREE.PlaneGeometry(240, 240, 100, 100);
    geo.rotateX(-Math.PI / 2);
    const pos = geo.attributes.position;
    const colors = [];
    const c = new THREE.Color();
    const lawn   = new THREE.Color(0x69a04a), lawnD  = new THREE.Color(0x577f3a);
    const earth  = new THREE.Color(0x9a7448), earthD = new THREE.Color(0x82613b);
    const wild   = new THREE.Color(0x4a7c38), wildD  = new THREE.Color(0x3a6030);
    const pitch  = new THREE.Color(0x5da03e), pitchL = new THREE.Color(0x69b148);
    const cw = GameConfig.world.compound, f = GameConfig.world.field;

    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), z = pos.getZ(i);
      const n = 0.5 + 0.5 * Math.sin(x * 0.61 + z * 0.83) * Math.cos(x * 0.37 - z * 0.53);
      const out = Math.max(Math.abs(x) - cw.halfW, Math.abs(z) - cw.halfD);

      if (out > 0) {
        // countryside beyond the wall — gently rolling, deeper green
        const rise = Math.min(out / 7, 1);
        pos.setY(i, (Math.sin(x * 0.11) + Math.cos(z * 0.13)) * 0.55 * rise);
        c.copy(wild).lerp(wildD, n);
      } else if (Math.abs(x - f.cx) < f.halfW && Math.abs(z - f.cz) < f.halfD) {
        // football field — mowing stripes across the width
        const stripe = Math.floor((x - f.cx + f.halfW) / 4.25) % 2 === 0;
        c.copy(stripe ? pitchL : pitch).lerp(lawnD, n * 0.25);
      } else {
        // school lawn, worn to packed earth where borof pani is played
        const r = Math.sqrt(x * x + z * z);
        const wear = THREE.MathUtils.clamp(1 - (r - 6) / 9, 0, 1);
        c.copy(lawn).lerp(lawnD, n * 0.6).lerp(n > 0.5 ? earth : earthD, wear);
      }
      colors.push(c.r, c.g, c.b);
    }
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ vertexColors: true }));
    mesh.receiveShadow = true;
    return mesh;
  }

  _buildPlayCircle() {
    // The chalk ring on the earthen yard — the borof-pani arena.
    const R = GameConfig.world.courtyardRadius;
    const geo = new THREE.RingGeometry(R - 0.14, R + 0.14, 96);
    geo.rotateX(-Math.PI / 2);
    const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
      color: 0xf7f3e8, transparent: true, opacity: 0.55, depthWrite: false,
    }));
    mesh.position.y = 0.03;
    return mesh;
  }

  /* ── football field ───────────────────────────────────────── */

  _buildField() {
    const g = new THREE.Group();
    const f = GameConfig.world.field;
    const lineMat = new THREE.MeshBasicMaterial({
      color: 0xf5f5ee, transparent: true, opacity: 0.9, depthWrite: false,
    });
    const LW = 0.14;
    const line = (w, d, x, z) => {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), lineMat);
      m.rotation.x = -Math.PI / 2;
      m.position.set(x, 0.035, z);
      g.add(m);
    };
    const W = f.halfW * 2, D = f.halfD * 2;
    line(W, LW, f.cx, f.cz - f.halfD);              // sidelines
    line(W, LW, f.cx, f.cz + f.halfD);
    line(LW, D, f.cx - f.halfW, f.cz);              // goal lines (east/west)
    line(LW, D, f.cx + f.halfW, f.cz);
    line(LW, D, f.cx, f.cz);                        // halfway line

    const ring = new THREE.Mesh(new THREE.RingGeometry(2.93, 3.07, 48), lineMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(f.cx, 0.035, f.cz);
    g.add(ring);

    for (const s of [-1, 1]) {                      // goal boxes + goals at both ends
      const gx = f.cx + s * f.halfW;
      const boxW = 3.5, boxD = 8;
      line(LW, boxD, gx - s * boxW, f.cz);
      line(boxW, LW, gx - s * boxW / 2, f.cz - boxD / 2);
      line(boxW, LW, gx - s * boxW / 2, f.cz + boxD / 2);
      g.add(this._makeGoal(gx, f.cz, s));
    }
    return g;
  }

  _makeGoal(x, z, s) {                              // s=+1 east end, opening faces -x
    const g = new THREE.Group();
    const white = new THREE.MeshLambertMaterial({ color: 0xf2f2ee });
    const postGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.7, 6);
    for (const dz of [-1.8, 1.8]) {
      const p = new THREE.Mesh(postGeo, white);
      p.position.set(x, 0.85, z + dz);
      p.castShadow = true;
      g.add(p);
      const stay = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 2.1, 5), white);
      stay.position.set(x + s * 0.55, 0.83, z + dz);
      stay.rotation.z = -s * 0.575;                 // slants back to the ground
      g.add(stay);
    }
    const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3.72, 6), white);
    bar.rotation.x = Math.PI / 2;
    bar.position.set(x, 1.7, z);
    bar.castShadow = true;
    g.add(bar);

    const netGeo = new THREE.PlaneGeometry(3.6, 2.15);
    netGeo.rotateY(Math.PI / 2);
    const net = new THREE.Mesh(netGeo, new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.16,
      side: THREE.DoubleSide, depthWrite: false,
    }));
    net.position.set(x + s * 0.55, 0.85, z);
    net.rotation.z = s * 0.54;                      // hangs from crossbar to the stays
    g.add(net);
    return g;
  }

  /* ── school building ──────────────────────────────────────── */

  async _buildSchool() {
    const g = new THREE.Group();
    const yellow = new THREE.MeshLambertMaterial({ color: 0xefd98f });   // the classic wall paint
    const maroon = new THREE.MeshLambertMaterial({ color: 0x9c3b2e });   // trim band
    const concrete = new THREE.MeshLambertMaterial({ color: 0xcfc7b4 });
    const doorMat = new THREE.MeshLambertMaterial({ color: 0x1f4d3a });
    const winMat = new THREE.MeshLambertMaterial({ color: 0x2b4a63 });
    const frameMat = new THREE.MeshLambertMaterial({ color: 0xf6efdb });
    const box = (geo, mat, x, y, z, cast = true) => {
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z);
      m.castShadow = cast;
      m.receiveShadow = true;
      g.add(m);
      return m;
    };

    // plinth + front steps
    box(new THREE.BoxGeometry(28, 0.5, 9), concrete, 0, 0.25, -22);
    box(new THREE.BoxGeometry(4, 0.34, 1.0), concrete, 0, 0.17, -17.0);
    box(new THREE.BoxGeometry(4, 0.17, 0.5), concrete, 0, 0.085, -16.4);

    // classroom block (rear) + maroon band
    box(new THREE.BoxGeometry(26, 3.4, 5.5), yellow, 0, 0.5 + 1.7, -23.5);
    box(new THREE.BoxGeometry(26.12, 0.7, 5.62), maroon, 0, 0.85, -23.5, false);

    // verandah columns with maroon bases (front face z = -18.2)
    const colGeo = new THREE.BoxGeometry(0.32, 3.4, 0.32);
    const baseGeo = new THREE.BoxGeometry(0.42, 0.9, 0.42);
    for (let x = -12; x <= 12; x += 4) {
      box(colGeo, yellow, x, 0.5 + 1.7, -18.2);
      box(baseGeo, maroon, x, 0.5 + 0.45, -18.2, false);
    }

    // doors and shuttered windows on the classroom wall (face z = -20.75)
    const faceZ = -20.72;
    for (const x of [-8, 0, 8]) {
      box(new THREE.BoxGeometry(1.3, 2.5, 0.06), frameMat, x, 0.5 + 1.25, faceZ, false);
      box(new THREE.BoxGeometry(1.1, 2.3, 0.06), doorMat, x, 0.5 + 1.15, faceZ - 0.02, false);
    }
    for (const x of [-11.5, -4, 4, 11.5]) {
      box(new THREE.BoxGeometry(1.45, 1.45, 0.06), frameMat, x, 0.5 + 1.85, faceZ, false);
      box(new THREE.BoxGeometry(1.2, 1.2, 0.06), winMat, x, 0.5 + 1.85, faceZ - 0.02, false);
    }

    // corrugated tin roof — long front slope shelters the verandah
    const ridgeY = 5.15, ridgeZ = -23.5;
    const tin = new THREE.MeshLambertMaterial({ color: 0xb7bdc2 });
    const seam = new THREE.MeshLambertMaterial({ color: 0x99a0a6 });
    const slope = (spanZ, eaveY, dir) => {           // dir −1 = toward front (+z)
      const run = Math.abs(spanZ), rise = ridgeY - eaveY;
      const len = Math.hypot(run, rise);
      const grp = new THREE.Group();
      const slab = new THREE.Mesh(new THREE.BoxGeometry(28.8, 0.12, len), tin);
      slab.castShadow = true;
      slab.receiveShadow = true;
      grp.add(slab);
      for (let x = -13.5; x <= 13.5; x += 2.25) {    // corrugation seams down-slope
        const strip = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.05, len * 0.98), seam);
        strip.position.set(x, 0.085, 0);
        grp.add(strip);
      }
      grp.position.set(0, (ridgeY + eaveY) / 2, ridgeZ - dir * run / 2);
      grp.rotation.x = -dir * Math.atan2(rise, run);   // eave falls away from the ridge
      g.add(grp);
    };
    slope(6.4, 3.95, -1);                            // front, out over the verandah
    slope(3.2, 4.15, 1);                             // rear
    box(new THREE.BoxGeometry(29, 0.16, 0.55), maroon, 0, ridgeY + 0.05, ridgeZ);

    // signboard — canvas texture, real Bengali lettering
    g.add(await this._makeSignboard(0, 3.55, -17.9));

    // flag pole + the waving flag of Bangladesh
    g.add(this._makeFlagPole(9, -14.5));
    return g;
  }

  async _makeSignboard(x, y, z) {
    if (document.fonts && document.fonts.load) {
      await document.fonts.load('600 60px "Hind Siliguri"').catch(() => {});
    }
    const cv = document.createElement('canvas');
    cv.width = 1024; cv.height = 128;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#1d4d3a';
    ctx.fillRect(0, 0, 1024, 128);
    ctx.strokeStyle = '#d9b64a';
    ctx.lineWidth = 8;
    ctx.strokeRect(6, 6, 1012, 116);
    ctx.fillStyle = '#f5f1e4';
    ctx.textAlign = 'center';
    ctx.font = '600 56px "Hind Siliguri", sans-serif';
    ctx.fillText('সরকারি প্রাথমিক বিদ্যালয়', 512, 66);
    ctx.font = '400 24px "Hind Siliguri", sans-serif';
    ctx.fillStyle = '#cfe3d0';
    ctx.fillText('GOVT. PRIMARY SCHOOL', 512, 104);
    const tex = new THREE.CanvasTexture(cv);
    tex.encoding = THREE.sRGBEncoding;
    const board = new THREE.Mesh(
      new THREE.PlaneGeometry(7, 0.875),
      new THREE.MeshLambertMaterial({ map: tex }));
    board.position.set(x, y, z);
    return board;
  }

  _makeFlagPole(x, z) {
    const g = new THREE.Group();
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.045, 0.06, 7, 8),
      new THREE.MeshLambertMaterial({ color: 0xd8d8d4 }));
    pole.position.set(x, 3.5, z);
    pole.castShadow = true;
    g.add(pole);
    const finial = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 8),
      new THREE.MeshLambertMaterial({ color: 0xd9b64a }));
    finial.position.set(x, 7.05, z);
    g.add(finial);

    // bottle-green field, red circle set toward the hoist — waving in the wind
    const geo = new THREE.PlaneGeometry(1.5, 0.9, 16, 8);
    geo.translate(0.75, 0, 0);                       // hoist edge pinned to the pole
    this._flagUniforms = { time: { value: 0 }, gust: { value: 0.6 } };
    const mat = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,
      uniforms: this._flagUniforms,
      vertexShader: `
        uniform float time, gust;
        varying vec2 vUv; varying float vWave;
        void main() {
          vUv = uv;
          vec3 p = position;
          float w = sin(p.x * 4.2 - time * 7.0) * 0.5
                  + sin(p.x * 7.0 - time * 11.0) * 0.25;
          float att = smoothstep(0.0, 1.5, p.x);
          p.z += w * 0.16 * att * (0.35 + 0.65 * gust);
          p.y += w * 0.03 * att;
          vWave = w * att;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
        }`,
      fragmentShader: `
        varying vec2 vUv; varying float vWave;
        void main() {
          float d = length(vec2((vUv.x - 0.45) * 1.667, vUv.y - 0.5));
          vec3 col = d < 0.30 ? vec3(0.957, 0.165, 0.255)    // red sun
                              : vec3(0.0, 0.416, 0.306);     // bottle green
          col *= 0.90 + 0.12 * vWave;                        // wave shading
          gl_FragColor = vec4(col, 1.0);
        }`,
    });
    const flag = new THREE.Mesh(geo, mat);
    flag.position.set(x + 0.05, 6.35, z);
    g.add(flag);
    return g;
  }

  /* ── boundary wall ────────────────────────────────────────── */

  _buildWall() {
    const g = new THREE.Group();
    const cw = GameConfig.world.compound;
    const brick = new THREE.MeshLambertMaterial({ color: 0xc8b49a });
    const band = new THREE.MeshLambertMaterial({ color: 0x8f4a3a });
    const pillarMat = new THREE.MeshLambertMaterial({ color: 0xb5a186 });
    const H = 1.9, T = 0.35;

    const run = (len, cx, cz, rotY) => {
      const seg = new THREE.Group();
      const wall = new THREE.Mesh(new THREE.BoxGeometry(len, H, T), brick);
      wall.position.y = H / 2;
      wall.castShadow = true;
      wall.receiveShadow = true;
      const stripe = new THREE.Mesh(new THREE.BoxGeometry(len, 0.6, T + 0.08), band);
      stripe.position.y = 0.3;
      seg.add(wall, stripe);
      seg.position.set(cx, 0, cz);
      seg.rotation.y = rotY;
      g.add(seg);
      // pillars along the run
      const count = Math.max(2, Math.round(len / 8.8));
      for (let i = 0; i <= count; i++) {
        const t = -len / 2 + (len * i) / count;
        const px = cx + Math.cos(rotY) * t, pz = cz - Math.sin(rotY) * t;
        const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.55, 2.25, 0.55), pillarMat);
        pillar.position.set(px, 1.125, pz);
        pillar.castShadow = true;
        const cap = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.16, 0.72), band);
        cap.position.set(px, 2.33, pz);
        g.add(pillar, cap);
      }
    };

    run(cw.halfW * 2, 0, -cw.halfD, 0);                       // north (behind school)
    run(cw.halfD * 2, -cw.halfW, 0, Math.PI / 2);             // west
    run(cw.halfD * 2, cw.halfW, 0, Math.PI / 2);              // east
    const gateHalf = 2.6;                                      // south wall, split by the gate
    const sideLen = cw.halfW - gateHalf;
    run(sideLen, -(gateHalf + sideLen / 2), cw.halfD, 0);
    run(sideLen, (gateHalf + sideLen / 2), cw.halfD, 0);

    // gate: tall pillars + barred iron panels
    const iron = new THREE.MeshLambertMaterial({ color: 0x2e4d3a });
    for (const s of [-1, 1]) {
      const gp = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2.7, 0.6), pillarMat);
      gp.position.set(s * (gateHalf + 0.3), 1.35, cw.halfD);
      gp.castShadow = true;
      const cap = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.8), band);
      cap.position.set(s * (gateHalf + 0.3), 2.8, cw.halfD);
      g.add(gp, cap);

      const panel = new THREE.Group();
      const frame = new THREE.Mesh(new THREE.BoxGeometry(2.45, 1.85, 0.07), iron);
      frame.position.y = 1.15;
      panel.add(frame);
      for (let i = -2; i <= 2; i++) {
        const spike = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.45, 5), iron);
        spike.position.set(i * 0.45, 2.2, 0);
        panel.add(spike);
      }
      panel.position.set(s * (gateHalf / 2 + 0.05), 0, cw.halfD);
      g.add(panel);
    }
    return g;
  }

  /* ── playground equipment (west yard) ─────────────────────── */

  _buildPlayground() {
    const g = new THREE.Group();
    g.add(this._makeSwingSet(-30, -7));
    g.add(this._makeSeesaw(-30, 1));
    g.add(this._makeSlide(-30, 8));
    return g;
  }

  _makeSwingSet(x, z) {
    const g = new THREE.Group();
    const red = new THREE.MeshLambertMaterial({ color: 0xc23b3b });
    const dark = new THREE.MeshLambertMaterial({ color: 0x3a3a3a });
    const chainMat = new THREE.MeshLambertMaterial({ color: 0x8f9296 });

    const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 3.4, 8), red);
    bar.rotation.x = Math.PI / 2;
    bar.position.y = 2.3;
    bar.castShadow = true;
    g.add(bar);
    for (const ez of [-1.6, 1.6]) {                 // A-frame legs at each end
      for (const s of [-1, 1]) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2.5, 6), red);
        leg.position.set(s * 0.45, 1.15, ez);
        leg.rotation.z = -s * 0.37;
        leg.castShadow = true;
        g.add(leg);
      }
    }
    for (const sz of [-0.8, 0.8]) {                 // two swings, pendulums in the wind
      const pivot = new THREE.Group();
      pivot.position.set(0, 2.3, sz);
      for (const cx of [-0.2, 0.2]) {
        const chain = new THREE.Mesh(new THREE.CylinderGeometry(0.014, 0.014, 1.5, 4), chainMat);
        chain.position.set(cx, -0.75, 0);
        pivot.add(chain);
      }
      const seat = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.06, 0.24), dark);
      seat.position.y = -1.52;
      seat.castShadow = true;
      pivot.add(seat);
      g.add(pivot);
      this._sway.swings.push({
        obj: pivot, amp: 0.16 + this._rand() * 0.08,
        speed: 1.05 + this._rand() * 0.2, phase: this._rand() * Math.PI * 2,
      });
    }
    g.position.set(x, 0, z);
    return g;
  }

  _makeSeesaw(x, z) {
    const g = new THREE.Group();
    const fulcrum = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.5, 3), 
      new THREE.MeshLambertMaterial({ color: 0x3f7fbf }));
    fulcrum.rotation.z = Math.PI / 2;
    fulcrum.rotation.y = Math.PI / 2;
    fulcrum.position.y = 0.3;
    fulcrum.castShadow = true;
    g.add(fulcrum);

    const plank = new THREE.Group();
    const board = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.1, 0.42),
      new THREE.MeshLambertMaterial({ color: 0xe0a53a }));
    board.castShadow = true;
    plank.add(board);
    const handleMat = new THREE.MeshLambertMaterial({ color: 0x3a3a3a });
    for (const s of [-1, 1]) {
      const h = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.3, 5), handleMat);
      h.position.set(s * 1.35, 0.2, 0);
      plank.add(h);
    }
    plank.position.y = 0.56;
    plank.rotation.z = 0.12;
    g.add(plank);
    this._seesawPlank = plank;
    g.position.set(x, 0, z);
    return g;
  }

  _makeSlide(x, z) {
    const g = new THREE.Group();
    const steel = new THREE.MeshLambertMaterial({ color: 0xc23b3b });
    const chute = new THREE.MeshLambertMaterial({ color: 0x3f7fbf });

    for (const lx of [-0.35, 0.35]) {               // platform legs
      for (const lz of [-0.35, 0.35]) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.55, 6), steel);
        leg.position.set(lx, 0.775, lz);
        g.add(leg);
      }
    }
    const deck = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.08, 0.9), chute);
    deck.position.y = 1.55;
    deck.castShadow = true;
    g.add(deck);

    for (const s of [-0.3, 0.3]) {                  // ladder on the −z side
      const rail = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.85, 5), steel);
      rail.position.set(s, 0.85, -0.85);
      rail.rotation.x = 0.42;
      g.add(rail);
    }
    for (let i = 1; i <= 4; i++) {
      const rung = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.6, 5), steel);
      rung.rotation.z = Math.PI / 2;
      rung.position.set(0, i * 0.36, -0.5 - i * 0.16);
      g.add(rung);
    }

    const slideBoard = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.06, 2.75), chute);
    slideBoard.position.set(0, 0.83, 1.5);
    slideBoard.rotation.x = 0.6;
    slideBoard.castShadow = true;
    g.add(slideBoard);
    for (const s of [-0.36, 0.36]) {                // chute side rails
      const rail = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.16, 2.75), steel);
      rail.position.set(s, 0.9, 1.5);
      rail.rotation.x = 0.6;
      g.add(rail);
    }
    g.position.set(x, 0, z);
    g.rotation.y = Math.PI;                         // chute faces the yard, ladder the wall
    return g;
  }

  /* ── benches ──────────────────────────────────────────────── */

  _makeBench(x, z, rotY) {
    const g = new THREE.Group();
    const wood = new THREE.MeshLambertMaterial({ color: 0x9a6a3c });
    const legMat = new THREE.MeshLambertMaterial({ color: 0x6f4a2e });
    const seat = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.09, 0.48), wood);
    seat.position.y = 0.46;
    seat.castShadow = true;
    g.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.38, 0.07), wood);
    back.position.set(0, 0.85, -0.21);
    back.rotation.x = -0.14;
    back.castShadow = true;
    g.add(back);
    for (const s of [-0.8, 0.8]) {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.46, 0.42), legMat);
      leg.position.set(s, 0.23, 0);
      g.add(leg);
    }
    g.position.set(x, 0, z);
    g.rotation.y = rotY;
    return g;
  }

  _buildBenches() {
    const g = new THREE.Group();
    g.add(this._makeBench(17.5, -9, Math.PI));          // under the krishnachura
    g.add(this._makeBench(20.5, -7, Math.PI * 0.85));
    g.add(this._makeBench(-16, -14, 0));                // facing the school yard
    g.add(this._makeBench(22.5, 15, Math.PI / 2));      // watching the football field
    g.add(this._makeBench(-24.5, 13, -Math.PI / 2));    // beside the playground
    return g;
  }

  /* ── trees ────────────────────────────────────────────────── */

  _makeLeafTree(trunkH, canopyR, lobeColors, lobes = 4) {
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(trunkH * 0.05, trunkH * 0.085, trunkH, 6),
      new THREE.MeshLambertMaterial({ color: 0x5a4028 }));
    trunk.position.y = trunkH / 2;
    trunk.castShadow = true;
    tree.add(trunk);

    const canopy = new THREE.Group();               // sways as one crown
    canopy.position.y = trunkH;
    for (let i = 0; i < lobes; i++) {
      const mat = new THREE.MeshLambertMaterial({
        color: lobeColors[i % lobeColors.length] });
      const lobe = new THREE.Mesh(new THREE.IcosahedronGeometry(
        canopyR * (0.65 + this._rand() * 0.5), 0), mat);
      lobe.position.set(
        (this._rand() - 0.5) * canopyR * 1.2,
        (this._rand() - 0.15) * canopyR * 0.8,
        (this._rand() - 0.5) * canopyR * 1.2);
      lobe.rotation.set(this._rand() * 3, this._rand() * 3, this._rand() * 3);
      lobe.castShadow = true;
      canopy.add(lobe);
    }
    tree.add(canopy);
    this._sway.canopies.push({
      obj: canopy, baseX: 0, baseZ: 0, amp: 0.035 + this._rand() * 0.02,
      speed: 0.7 + this._rand() * 0.5, phase: this._rand() * Math.PI * 2,
    });
    return tree;
  }

  _makePalm(h) {
    const palm = new THREE.Group();
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8a6f52 });
    const segs = 6, lean = 0.55 + this._rand() * 0.4;
    for (let i = 0; i < segs; i++) {                // gently curving trunk
      const t = i / segs;
      const seg = new THREE.Mesh(new THREE.CylinderGeometry(
        0.09 * (1 - t * 0.4), 0.11 * (1 - t * 0.35), h / segs + 0.06, 6), trunkMat);
      seg.position.set(lean * t * t, (i + 0.5) * (h / segs), 0);
      seg.rotation.z = -lean * t * 0.5;
      seg.castShadow = i % 2 === 0;
      palm.add(seg);
    }
    const crown = new THREE.Group();
    crown.position.set(lean, h + 0.1, 0);
    const frondGeo = new THREE.ConeGeometry(0.42, 2.3, 4);
    frondGeo.rotateZ(-Math.PI / 2);                 // apex points +x
    frondGeo.translate(1.15, 0, 0);                 // base pinned at the crown
    frondGeo.scale(1, 0.35, 1);
    for (let i = 0; i < 8; i++) {
      const frond = new THREE.Mesh(frondGeo, new THREE.MeshLambertMaterial({
        color: i % 2 ? 0x4f8f3a : 0x3f7a30 }));
      frond.rotation.y = (i / 8) * Math.PI * 2;
      frond.rotation.z = -(0.3 + this._rand() * 0.3);   // droop
      frond.castShadow = true;
      crown.add(frond);
    }
    palm.add(crown);
    this._sway.canopies.push({
      obj: crown, baseX: 0, baseZ: 0, amp: 0.07 + this._rand() * 0.03,
      speed: 0.9 + this._rand() * 0.4, phase: this._rand() * Math.PI * 2,
    });
    return palm;
  }

  _buildTrees() {
    const g = new THREE.Group();
    const place = (tree, x, z) => { tree.position.set(x, 0, z); tree.rotation.y = this._rand() * Math.PI * 2; g.add(tree); };

    // krishnachura (flame trees) — flowering red over the benches
    const flame = [0xd94f2b, 0x3f6b2e, 0xc9452f, 0x476f2f];
    place(this._makeLeafTree(4.6, 2.6, flame, 6), 18, -7);
    place(this._makeLeafTree(4.0, 2.2, flame, 5), -17, -12);

    // mango and rain trees inside the compound corners
    const mango = [0x2f5a2a, 0x3a6b31];
    place(this._makeLeafTree(4.2, 2.9, mango, 6), 34, -25);
    place(this._makeLeafTree(3.6, 2.4, mango, 5), -37, -24);
    place(this._makeLeafTree(3.9, 2.5, [0x37502c, 0x2c4d3a], 5), 36, 24);

    // coconut palms along the south wall and gate
    for (const [px, pz] of [[-38, 27], [-12, 28.5], [14, 28], [38, 26], [7, 30.5], [-33, -28]]) {
      place(this._makePalm(4.5 + this._rand() * 1.6), px, pz);
    }

    // countryside trees beyond the wall
    const wildCols = [0x37502c, 0x2c4d3a, 0x445a2b];
    for (let i = 0; i < 9; i++) {
      const a = this._rand() * Math.PI * 2;
      const r = 55 + this._rand() * 35;
      place(this._makeLeafTree(3 + this._rand() * 2.5, 1.4 + this._rand() * 1.4,
        [wildCols[i % 3], wildCols[(i + 1) % 3]], 3), Math.cos(a) * r, Math.sin(a) * r);
    }
    return g;
  }

  /* ── grass tufts (wind-swayed) ────────────────────────────── */

  _buildGrassTufts() {
    const g = new THREE.Group();
    const geo = new THREE.ConeGeometry(0.07, 0.46, 4);
    geo.translate(0, 0.23, 0);                      // pivot at the roots
    const mats = [0x74a852, 0x699b48, 0x81b25c].map(
      (col) => new THREE.MeshLambertMaterial({ color: col }));
    const cw = GameConfig.world.compound, f = GameConfig.world.field;
    let placed = 0, guard = 0;
    while (placed < 140 && guard++ < 900) {
      const x = (this._rand() * 2 - 1) * (cw.halfW - 2);
      const z = (this._rand() * 2 - 1) * (cw.halfD - 2);
      if (Math.abs(x - f.cx) < f.halfW + 1 && Math.abs(z - f.cz) < f.halfD + 1) continue; // off the pitch
      if (Math.hypot(x, z) < 15) continue;                       // off the earthen yard
      if (z < -16) continue;                                     // off the school frontage
      if (x > -36 && x < -24 && z > -10 && z < 11) continue;     // off the equipment pads
      const tuft = new THREE.Mesh(geo, mats[placed % 3]);
      tuft.position.set(x, 0, z);
      tuft.scale.setScalar(0.7 + this._rand() * 0.8);
      g.add(tuft);
      this._sway.grass.push({
        obj: tuft, baseZ: 0, amp: 0.16 + this._rand() * 0.1,
        speed: 1.4 + this._rand() * 0.9, phase: this._rand() * Math.PI * 2,
      });
      placed++;
    }
    return g;
  }

  /* ── clouds (wind-drifted) ────────────────────────────────── */

  _buildClouds() {
    const g = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
    for (let i = 0; i < 4; i++) {
      const cloud = new THREE.Group();
      const puffs = 4 + Math.floor(this._rand() * 3);
      for (let p = 0; p < puffs; p++) {
        const puff = new THREE.Mesh(
          new THREE.IcosahedronGeometry(2 + this._rand() * 2.4, 0), mat);
        puff.position.set((p - puffs / 2) * 2.6 + this._rand(), this._rand() * 1.2, this._rand() * 2);
        puff.scale.y = 0.45;
        cloud.add(puff);
      }
      cloud.position.set(-70 + i * 42 + this._rand() * 14, 27 + this._rand() * 8, -30 + this._rand() * 60);
      g.add(cloud);
      this._clouds.push(cloud);
    }
    return g;
  }

  /* ── birds (circling, flapping) ───────────────────────────── */

  _buildBirds() {
    const g = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color: 0x3a332c, side: THREE.DoubleSide });
    const bodyGeo = new THREE.ConeGeometry(0.06, 0.4, 4);
    bodyGeo.rotateX(Math.PI / 2);                   // nose forward (+z)
    const wingGeoR = new THREE.PlaneGeometry(0.55, 0.22);
    wingGeoR.rotateX(-Math.PI / 2);
    wingGeoR.translate(0.28, 0, 0);
    const wingGeoL = wingGeoR.clone();
    wingGeoL.scale(-1, 1, 1);

    for (let i = 0; i < 6; i++) {
      const bird = new THREE.Group();
      bird.add(new THREE.Mesh(bodyGeo, mat));
      const wr = new THREE.Mesh(wingGeoR, mat);
      const wl = new THREE.Mesh(wingGeoL, mat);
      bird.add(wr, wl);
      g.add(bird);
      this._birds.push({
        obj: bird, wr, wl,
        cx: (this._rand() - 0.5) * 40, cz: (this._rand() - 0.5) * 40,
        rx: 14 + this._rand() * 12, rz: 9 + this._rand() * 9,
        h: 14 + this._rand() * 8,
        speed: (0.16 + this._rand() * 0.14) * (this._rand() > 0.5 ? 1 : -1),
        phase: this._rand() * Math.PI * 2,
        flap: 6 + this._rand() * 3,
      });
    }
    return g;
  }

  /* ── the wind, applied everywhere ─────────────────────────── */

  update(dt) {
    this._time += dt;
    const t = this._time;
    const gust = this.windGust(t);

    for (const s of this._sway.canopies) {          // tree crowns + palm fronds
      s.obj.rotation.z = s.baseZ + s.amp * gust * Math.sin(t * s.speed + s.phase);
      s.obj.rotation.x = s.baseX + s.amp * 0.6 * gust * Math.sin(t * s.speed * 0.8 + s.phase * 1.3);
    }
    for (const s of this._sway.grass) {             // grass shivers faster, lower mass
      s.obj.rotation.z = s.amp * (0.3 + 0.7 * gust) * Math.sin(t * s.speed + s.phase);
    }
    for (const s of this._sway.swings) {            // empty swings, pushed by gusts
      s.obj.rotation.z = s.amp * (0.35 + 0.65 * gust) * Math.sin(t * s.speed + s.phase);
    }
    if (this._seesawPlank) {                        // idle tilt breathing
      this._seesawPlank.rotation.z = 0.12 + 0.02 * Math.sin(t * 0.8);
    }

    for (const cloud of this._clouds) {             // clouds ride the easterly
      cloud.position.x += GameConfig.wind.baseSpeed * (0.4 + 0.6 * gust) * dt;
      cloud.position.z += GameConfig.wind.baseSpeed * 0.22 * gust * dt;
      if (cloud.position.x > 95) { cloud.position.x = -95; cloud.position.z = -30 + Math.random() * 60; }
    }

    const look = new THREE.Vector3();
    for (const b of this._birds) {                  // elliptical patrols, flapping
      const th = t * b.speed + b.phase;
      b.obj.position.set(
        b.cx + Math.cos(th) * b.rx,
        b.h + Math.sin(t * 0.9 + b.phase) * 0.6,
        b.cz + Math.sin(th) * b.rz);
      look.set(
        b.cx + Math.cos(th + 0.1 * Math.sign(b.speed)) * b.rx,
        b.obj.position.y,
        b.cz + Math.sin(th + 0.1 * Math.sign(b.speed)) * b.rz);
      b.obj.lookAt(look);
      b.obj.rotateZ(-0.25 * Math.sign(b.speed));    // bank into the turn
      const flap = 0.2 + 0.6 * Math.sin(t * b.flap + b.phase);
      b.wr.rotation.z = flap;
      b.wl.rotation.z = -flap;
    }

    if (this._flagUniforms) {                       // the flag reads the same wind
      this._flagUniforms.time.value = t;
      this._flagUniforms.gust.value = gust;
    }
  }
}

/* ════════════════════════════════════════════════════════════
   src/managers/CameraController.js
   Mode-based camera. MENU_ORBIT is live now (slow drift around
   the courtyard). FOLLOW is declared with its config surface and
   activates in the gameplay build.
   ════════════════════════════════════════════════════════════ */
const CameraMode = Object.freeze({ MENU_ORBIT: 'MENU_ORBIT', FOLLOW: 'FOLLOW' });

class CameraController {
  constructor(bus) {
    this.bus = bus;
    const c = GameConfig.camera;
    this.camera = new THREE.PerspectiveCamera(
      c.fov, window.innerWidth / window.innerHeight, c.near, c.far);
    this.mode = CameraMode.MENU_ORBIT;
    this._orbitAngle = Math.PI * 0.5;
    this._lookTarget = new THREE.Vector3(0, c.menuOrbit.lookHeight, 0);
    this._reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    this.followTarget = null;

    // follow-mode state (the stub declared in v0.1, completed here)
    this._yaw = 0;                 // offset direction: 0 = behind the north-facing spawn
    this._pitch = 0.34;
    this._dist = GameConfig.camera.follow.dist;
    this._distTarget = GameConfig.camera.follow.dist;
    this._collision = null;
    this._lookSmooth = new THREE.Vector3();
    this._tmpTarget = new THREE.Vector3();
    this._tmpDesired = new THREE.Vector3();

    bus.on('viewport:resized', ({ aspect }) => {
      this.camera.aspect = aspect;
      this.camera.updateProjectionMatrix();
    });
  }

  setMode(mode) { this.mode = mode; }

  update(dt) {
    if (this.mode === CameraMode.MENU_ORBIT) {
      const o = GameConfig.camera.menuOrbit;
      const speed = this._reducedMotion ? o.speed * 0.35 : o.speed;
      this._orbitAngle += speed * dt;
      this.camera.position.set(
        Math.cos(this._orbitAngle) * o.radius,
        o.height + Math.sin(this._orbitAngle * 0.7) * 0.6,
        Math.sin(this._orbitAngle) * o.radius);
      this.camera.lookAt(this._lookTarget);
    }
    else if (this.mode === CameraMode.FOLLOW && this.followTarget) {
      const f = GameConfig.camera.follow;
      this._dist += (this._distTarget - this._dist) * Math.min(1, 12 * dt);
      const p = this.followTarget.position;
      this._tmpTarget.set(p.x, p.y + f.height, p.z);
      this._solveDesired(this._tmpTarget, this._tmpDesired);
      // exponential smoothing — identical feel at any frame rate
      const k = 1 - Math.exp(-GameConfig.camera.followDamping * 2.6 * dt);
      this.camera.position.lerp(this._tmpDesired, k);
      this._lookSmooth.lerp(this._tmpTarget, 1 - Math.exp(-16 * dt));
      this.camera.lookAt(this._lookSmooth);
    }
  }

  get yaw() { return this._yaw; }

  setCollision(collision) { this._collision = collision; }

  /* Enter FOLLOW behind the given target; idempotent for the same
     target so resuming from pause never re-snaps the camera. */
  beginFollow(target) {
    if (this.followTarget !== target) {
      this.followTarget = target;
      this._yaw = 0;               // start behind the player
      this._pitch = 0.34;
      this._dist = this._distTarget = GameConfig.camera.follow.dist;
      this._tmpTarget.set(target.position.x,
        target.position.y + GameConfig.camera.follow.height, target.position.z);
      this._lookSmooth.copy(this._tmpTarget);
      this._solveDesired(this._tmpTarget, this._tmpDesired);
      this.camera.position.copy(this._tmpDesired);   // no swoop from the menu orbit
    }
    this.setMode(CameraMode.FOLLOW);
  }

  /* Mouse look — full 360° yaw, clamped pitch, sensitivity from settings. */
  addLook(dx, dy) {
    const f = GameConfig.camera.follow;
    const rpp = 0.0016 + GameConfig.settings.cameraSensitivity * 0.0034;
    this._yaw -= dx * rpp;
    this._pitch = THREE.MathUtils.clamp(this._pitch + dy * rpp, f.pitchMin, f.pitchMax);
  }

  /* Wheel-adjustable follow distance. */
  addZoom(deltaY) {
    const f = GameConfig.camera.follow;
    this._distTarget = THREE.MathUtils.clamp(
      this._distTarget + deltaY * 0.0016, f.minDist, f.maxDist);
  }

  /* Spherical offset from the target, clamped against occluders. */
  _solveDesired(target, out) {
    const cp = Math.cos(this._pitch), sp = Math.sin(this._pitch);
    out.set(
      target.x + Math.sin(this._yaw) * cp * this._dist,
      target.y + sp * this._dist,
      target.z + Math.cos(this._yaw) * cp * this._dist);
    if (this._collision) this._collision.clampCamera(target, out, 0.3, out);
    if (out.y < 0.35) out.y = 0.35;
  }
}

/* ════════════════════════════════════════════════════════════
   src/managers/AudioManager.js
   WebAudio graph: master → { music, sfx }. All sound is
   synthesized (no files): an evening drone with slow movement,
   cricket chirps, and UI blips. Context unlocks on first gesture.
   ════════════════════════════════════════════════════════════ */
class AudioManager {
  constructor(bus) {
    this.bus = bus;
    this.ctx = null;
    this.master = null;
    this.musicBus = null;
    this.sfxBus = null;
    this._ambientStarted = false;
    this._cricketTimer = null;

    const unlock = () => this._ensureContext();
    window.addEventListener('pointerdown', unlock, { once: true });
    window.addEventListener('keydown', unlock, { once: true });

    bus.on('settings:volume', () => this.applyVolumes());
  }

  _ensureContext() {
    if (this.ctx) { if (this.ctx.state === 'suspended') this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.musicBus = this.ctx.createGain();
    this.sfxBus = this.ctx.createGain();
    this.musicBus.connect(this.master);
    this.sfxBus.connect(this.master);
    this.master.connect(this.ctx.destination);
    this.applyVolumes();
    this._startAmbient();
  }

  applyVolumes() {
    if (!this.ctx) return;
    const s = GameConfig.settings, t = this.ctx.currentTime;
    this.master.gain.setTargetAtTime(s.masterVolume, t, 0.05);
    this.musicBus.gain.setTargetAtTime(s.musicVolume * GameConfig.audio.ambientLevel, t, 0.05);
    this.sfxBus.gain.setTargetAtTime(s.sfxVolume, t, 0.05);
  }

  _startAmbient() {
    if (this._ambientStarted || !this.ctx) return;
    this._ambientStarted = true;
    const ctx = this.ctx;

    // Two detuned oscillators through a slow-breathing lowpass — a warm dusk pad.
    const padGain = ctx.createGain();
    padGain.gain.value = 0.16;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 320;
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 0.07;
    lfoGain.gain.value = 120;
    lfo.connect(lfoGain).connect(filter.frequency);
    for (const [freq, detune] of [[98, 0], [98, 7], [147, -5]]) {   // G2 + fifth
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      osc.detune.value = detune;
      osc.connect(filter);
      osc.start();
    }
    filter.connect(padGain).connect(this.musicBus);
    lfo.start();

    // Crickets: short filtered-noise trills at irregular intervals.
    const chirp = () => {
      if (!this.ctx) return;
      const t0 = ctx.currentTime;
      const bufLen = 0.05 * ctx.sampleRate;
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      for (let k = 0; k < 3; k++) {                      // three pulses per trill
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 4200 + Math.random() * 600;
        bp.Q.value = 14;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, t0 + k * 0.09);
        g.gain.linearRampToValueAtTime(0.05, t0 + k * 0.09 + 0.015);
        g.gain.linearRampToValueAtTime(0, t0 + k * 0.09 + 0.05);
        src.connect(bp).connect(g).connect(this.musicBus);
        src.start(t0 + k * 0.09);
      }
      this._cricketTimer = setTimeout(chirp, 1200 + Math.random() * 3800);
    };
    chirp();
  }

  _blip({ freq = 660, dur = 0.07, type = 'sine', gain = 0.12, slideTo = null }) {
    if (!this.ctx) return;
    const ctx = this.ctx, t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(this.sfxBus);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  uiHover()   { this._blip({ freq: 520, dur: 0.045, gain: 0.05 }); }
  uiClick()   { this._blip({ freq: 700, dur: 0.07, slideTo: 880 }); }
  uiBack()    { this._blip({ freq: 620, dur: 0.08, slideTo: 440 }); }
  uiConfirm() {                                   // small two-note chime
    this._blip({ freq: 660, dur: 0.09 });
    setTimeout(() => this._blip({ freq: 990, dur: 0.14, gain: 0.1 }), 80);
  }

  /* ── gameplay build ── */
  sfxFreeze() {                                   // crystalline lock: high ping, icy fall
    this._blip({ freq: 1180, dur: 0.1, type: 'triangle', gain: 0.13 });
    setTimeout(() => this._blip({ freq: 640, dur: 0.24, type: 'triangle',
      gain: 0.12, slideTo: 360 }), 70);
  }

  sfxRescue() {                                   // watery release, rising
    this._blip({ freq: 380, dur: 0.09, slideTo: 760 });
    setTimeout(() => this._blip({ freq: 900, dur: 0.16, gain: 0.1, slideTo: 1280 }), 80);
  }

  sfxCountdown() { this._blip({ freq: 540, dur: 0.09, gain: 0.11 }); }
}
</script>
<script>
/* ════════════════════════════════════════════════════════════
   src/systems/FreezeSystem.js
   The heart of Borof Pani: a ledger of who is frozen ("borof!")
   and who is free, plus the ice-shell material factory. The full
   API is live now; the gameplay build wires touch events into it.
   Emits: freeze:frozen {playerId, by}, freeze:thawed {playerId, by},
          freeze:all-frozen (round-loss condition for runners)
   ════════════════════════════════════════════════════════════ */
class FreezeSystem {
  constructor(bus) {
    this.bus = bus;
    this._frozen = new Map();     // playerId → { at, by, elapsed }
    this._roster = [];            // ids of active runners (excludes the chor)
    this._iceMaterial = null;
  }

  /* Called by GameManager when a match starts. */
  beginRound(runnerIds) {
    this._roster = [...runnerIds];
    this._frozen.clear();
  }

  freeze(playerId, byPlayerId = null) {
    if (this._frozen.has(playerId)) return false;
    this._frozen.set(playerId, { at: performance.now(), by: byPlayerId, elapsed: 0 });
    this.bus.emit('freeze:frozen', { playerId, by: byPlayerId });
    if (this._roster.length > 0 &&
        this._roster.every((id) => this._frozen.has(id))) {
      this.bus.emit('freeze:all-frozen');
    }
    return true;
  }

  thaw(playerId, byPlayerId = null) {
    if (!GameConfig.freeze.thawOnTouch && byPlayerId !== null) return false;
    if (!this._frozen.delete(playerId)) return false;
    this.bus.emit('freeze:thawed', { playerId, by: byPlayerId });
    return true;
  }

  isFrozen(playerId) { return this._frozen.has(playerId); }
  frozenCount() { return this._frozen.size; }
  frozenIds() { return [...this._frozen.keys()]; }

  /* Per-frame: tracks elapsed frozen time; applies autoThaw if configured. */
  update(dt) {
    if (this._frozen.size === 0) return;
    const auto = GameConfig.freeze.autoThawSeconds;
    for (const [id, rec] of this._frozen) {
      rec.elapsed += dt;
      if (auto !== null && rec.elapsed >= auto) this.thaw(id, null);
    }
  }

  /* Shared translucent ice-shell material for frozen avatars.
     Built once, reused for every frozen player. */
  getIceMaterial() {
    if (!this._iceMaterial) {
      this._iceMaterial = new THREE.MeshPhongMaterial({
        color: 0xbfeef2,
        emissive: 0x1a3f46,
        transparent: true,
        opacity: 0.55,
        shininess: 120,
        side: THREE.DoubleSide,
      });
    }
    return this._iceMaterial;
  }

  reset() { this._frozen.clear(); this._roster = []; }
}

/* ════════════════════════════════════════════════════════════
   src/systems/LotterySystem.js
   Picks the chor (the catcher). Two modes:
   • 'rhyme'  — traditional counting-out: players stand in a ring,
                the rhyme's beats walk around it, whoever the last
                beat lands on is eliminated; repeat until one
                remains — they are the chor. Every elimination
                round is recorded so the gameplay build can animate
                the count around the circle.
   • 'random' — instant fair draw.
   ════════════════════════════════════════════════════════════ */
class LotterySystem {
  constructor(bus) { this.bus = bus; }

  draw(playerIds, mode = GameConfig.lottery.defaultMode) {
    const result = mode === 'rhyme'
      ? this._drawByRhyme(playerIds)
      : this._drawRandom(playerIds);
    this.bus.emit('lottery:drawn', result);
    return result;
  }

  _drawRandom(playerIds) {
    const chorId = playerIds[Math.floor(Math.random() * playerIds.length)];
    return { mode: 'random', chorId, rounds: [] };
  }

  _drawByRhyme(playerIds) {
    const beats = GameConfig.lottery.rhyme.beats;
    const ring = [...playerIds];
    const rounds = [];
    // random starting player, as in the courtyard
    let cursor = Math.floor(Math.random() * ring.length);
    while (ring.length > 1) {
      // walk `beats` steps around the ring; land on the eliminated player
      cursor = (cursor + beats - 1) % ring.length;
      const [eliminatedId] = ring.splice(cursor, 1);
      rounds.push({ eliminatedId, ringAfter: [...ring] });
      if (cursor >= ring.length) cursor = 0;
    }
    return { mode: 'rhyme', chorId: ring[0], rounds,
             rhymeText: GameConfig.lottery.rhyme.text };
  }
}

/* ════════════════════════════════════════════════════════════
   src/managers/PlayerManager.js
   Roster factory. Builds player records (one human + bots) with
   stable ids, names, and colors. Avatar meshes, spawning, and
   movement arrive in the gameplay build through spawnRoster(),
   which is declared here as the single entry point they will use.
   ════════════════════════════════════════════════════════════ */
class PlayerManager {
  constructor(bus) {
    this.bus = bus;
    this.roster = [];
    this._nextId = 1;
  }

  createRoster(count) {
    if (!GameConfig.players.allowedCounts.includes(count)) {
      throw new Error(`[PlayerManager] unsupported player count: ${count}`);
    }
    this.disposeRoster();
    const names = this._shuffled(GameConfig.players.namePool);
    for (let i = 0; i < count; i++) {
      this.roster.push({
        id: `p${this._nextId++}`,
        isHuman: i === 0,
        name: i === 0 ? 'তুমি You' : names[i - 1],
        color: GameConfig.players.colorPool[i % GameConfig.players.colorPool.length],
        role: 'runner',               // 'runner' | 'chor', set after the lottery
        avatar: null,                 // THREE.Object3D, attached by spawnRoster()
      });
    }
    this.bus.emit('roster:created', { roster: this.roster });
    return this.roster;
  }

  assignChor(chorId) {
    for (const p of this.roster) p.role = p.id === chorId ? 'chor' : 'runner';
    this.bus.emit('roster:chor-assigned', { chorId });
  }

  getPlayer(id) { return this.roster.find((p) => p.id === id) || null; }
  getHuman()    { return this.roster.find((p) => p.isHuman) || null; }
  runnerIds()   { return this.roster.filter((p) => p.role === 'runner').map((p) => p.id); }

  /* Instantiates bot avatars at ring positions inside the chalk circle
     (the stub declared in v0.1). The human avatar stays owned by the
     PlayerController; the GameManager links it into the roster and
     hands the bot records to the AIManager. */
  spawnRoster() {
    this._avatarInstances = new Map();
    const bots = this.roster.filter((p) => !p.isHuman);
    const R = 5.5;
    bots.forEach((p, i) => {
      const a = Math.PI / 2 + ((i + 1) / (bots.length + 1)) * Math.PI * 2;
      const av = new PlayerAvatar(p.color);
      av.root.position.set(Math.cos(a) * R, 0, Math.sin(a) * R);
      av.setFacing(Math.atan2(-av.root.position.x, -av.root.position.z));
      av.attachLabel(p.name);
      p.avatar = av.root;
      this._avatarInstances.set(p.id, av);
      this.bus.emit('scene:add-request', av.root);
    });
    this.bus.emit('roster:spawned', { count: bots.length });
    return bots;
  }

  getAvatarInstance(id) {
    return this._avatarInstances ? this._avatarInstances.get(id) || null : null;
  }

  disposeRoster() {
    for (const p of this.roster) {
      if (p.avatar) this.bus.emit('scene:remove-request', p.avatar);
    }
    this.roster = [];
  }

  _shuffled(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
}

/* ════════════════════════════════════════════════════════════
   src/managers/AIManager.js
   Registry of bot controllers, one per non-human player. Each
   controller carries its behavior config (built from difficulty +
   per-bot personality jitter) so bots don't feel identical. The
   think/steer loop is gated on PLAYING and ships with gameplay.
   ════════════════════════════════════════════════════════════ */
class AIManager {
  constructor(bus, stateManager) {
    this.bus = bus;
    this.stateManager = stateManager;
    this.controllers = new Map();   // playerId → controller record

    bus.on('roster:created', ({ roster }) => this.attach(roster));
  }

  attach(roster) {
    this.controllers.clear();
    for (const p of roster) {
      if (p.isHuman) continue;
      this.controllers.set(p.id, {
        playerId: p.id,
        // personality jitter so each bot reads differently on the field
        traits: {
          boldness: 0.35 + Math.random() * 0.5,   // how close it dares to the chor
          rescueBias: 0.3 + Math.random() * 0.6,  // urge to thaw frozen friends
          stamina: 0.6 + Math.random() * 0.4,     // sprint budget multiplier
        },
        blackboard: {},               // per-bot working memory for the FSM
        thinkAccumulator: Math.random() * 0.2,    // desync decision ticks
      });
    }
    this.bus.emit('ai:attached', { count: this.controllers.size });
  }

  /* Builds a brain + body per bot: the roster's chor gets CatcherAI,
     everyone else RunnerAI. Personality traits recorded at attach()
     shape each brain (boldness → escape distance, rescueBias →
     rescue eagerness, stamina → pace). `world` is the accessor
     object from the GameManager; brainStateOf is provided here so
     the catcher can read runner intentions. */
  activate(roster, world) {
    this.deactivate();
    this._world = world;
    world.brainStateOf = (p) => {
      if (p.isHuman) return 'Player';
      const b = this._brains && this._brains.find((x) => x.player.id === p.id);
      return b ? b.state : 'Idle';
    };
    this._brains = [];
    for (const p of roster) {
      if (p.isHuman) continue;
      const rec = this.controllers.get(p.id);
      const body = new BotBody(p, world);
      const Brain = p.role === 'chor' ? CatcherAI : RunnerAI;
      const brain = new Brain(p, body, rec ? rec.traits : null, world);
      if (rec) brain._think = rec.thinkAccumulator;   // desynced first decisions
      this._brains.push(brain);
    }
    this.bus.emit('ai:activated', { brains: this._brains.length });
  }

  deactivate() {
    if (this._brains) for (const b of this._brains) b.dispose();
    this._brains = null;
    this._world = null;
  }

  /* Live bot bodies — used by the separation pass and, later, gameplay. */
  bodies() { return this._brains ? this._brains.map((b) => b.body) : []; }

  update(dt) {
    if (!this.stateManager.is(GameState.PLAYING) || !this._brains) return;
    const frozen = (b) => this._world.freeze.isFrozen(b.player.id);
    for (const brain of this._brains) {
      if (frozen(brain)) { brain.body.holdFrozen(dt); continue; }   // ice = statue
      brain.update(dt);                                   // think ticks + steering
    }
    Steering.separate(this.bodies().filter((b) => !frozen({ player: b.player })),
      this._world);                                       // spacing, no overlaps
  }

  reset() { this.controllers.clear(); this.deactivate(); }
}
</script>

const Locales = { en: LocaleEN, bn: LocaleBN, ko: LocaleKO };

/* ── src/localization/LocalizationManager.js ── */

/* Persistence that never throws: real localStorage where the host
   allows it, transparent in-memory fallback where it's sandboxed
   (e.g. embedded previews). The game works identically in both. */
const SafeStorage = {
  _mem: {},
  _available: (() => {
    try {
      const k = '__borofpani_probe__';
      window.localStorage.setItem(k, '1');
      window.localStorage.removeItem(k);
      return true;
    } catch (_) { return false; }
  })(),
  get(key) {
    try { return this._available ? window.localStorage.getItem(key) : (this._mem[key] ?? null); }
    catch (_) { return this._mem[key] ?? null; }
  },
  set(key, value) {
    try { if (this._available) { window.localStorage.setItem(key, value); return; } }
    catch (_) { /* fall through to memory */ }
    this._mem[key] = value;
  },
};

class LocalizationManager {
  static get I() {
    if (!this._instance) this._instance = new LocalizationManager();
    return this._instance;
  }

  constructor() {
    this._lang = 'en';                 // English is the default
    this._bindings = new Set();
    this.bus = null;
    this.STORAGE_KEY = 'borofpani.language';
  }

  /* Called once from the composition root, before any screen builds,
     so the saved language is already active when the UI renders. */
  init(bus) {
    this.bus = bus;
    const saved = SafeStorage.get(this.STORAGE_KEY);
    if (saved && Locales[saved]) this._lang = saved;
    document.documentElement.lang = this._lang;
  }

  get language() { return this._lang; }
  languages() { return Object.values(Locales).map((l) => l._meta); }

  /* Current-language text with {var} interpolation; falls back to
     English, then to the key itself, so missing entries never break UI. */
  t(key, vars = null) {
    let s = Locales[this._lang].strings[key]
         ?? Locales.en.strings[key]
         ?? key;
    if (vars) for (const k of Object.keys(vars)) s = s.split('{' + k + '}').join(vars[k]);
    return s;
  }

  /* Companion-script text for dual-label buttons: Bangla flavor under
     English, English reference under Bangla and Korean. */
  sub(key) {
    const flavor = this._lang === 'en' ? 'bn' : 'en';
    return Locales[flavor].strings[key] ?? '';
  }

  /* Locale-correct numerals (Bengali digits in বাংলা). */
  digit(n) {
    const map = Locales[this._lang]._meta.digits;
    return String(n).replace(/[0-9]/g, (d) => map[+d]);
  }

  /* Bind an element to a key. Re-applied instantly on every change. */
  bind(el, key, opts = {}) {
    const entry = {
      el,
      apply: () => {
        const text = opts.sub ? this.sub(key) : this.t(key, opts.vars);
        if (opts.attr) el.setAttribute(opts.attr, text);
        else if (opts.html) el.innerHTML = text;
        else el.textContent = text;
      },
    };
    this._bindings.add(entry);
    entry.apply();
    return entry;
  }

  /* Bind an element to computed text — interpolation, digits, plurals. */
  bindFn(el, fn, opts = {}) {
    const entry = {
      el,
      apply: () => {
        const text = fn(this);
        if (opts.html) el.innerHTML = text;
        else el.textContent = text;
      },
    };
    this._bindings.add(entry);
    entry.apply();
    return entry;
  }

  setLanguage(code) {
    if (!Locales[code] || code === this._lang) return false;
    this._lang = code;
    SafeStorage.set(this.STORAGE_KEY, code);
    document.documentElement.lang = code;   // swaps the Korean font stack via CSS
    this._refresh();
    if (this.bus) this.bus.emit('locale:changed', { language: code });
    return true;
  }

  _refresh() {
    for (const b of this._bindings) b.apply();
    // declarative path — future screens opt in with an attribute only
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      el.textContent = this.t(el.getAttribute('data-i18n'));
    });
    document.querySelectorAll('[data-i18n-attr]').forEach((el) => {
      const [attr, key] = el.getAttribute('data-i18n-attr').split(':');
      if (attr && key) el.setAttribute(attr, this.t(key));
    });
  }
}

const L10N = LocalizationManager.I;

<script>
/* ════════════════════════════════════════════════════════════
   src/ui/screens/Screen.js
   Base class. Each screen owns its DOM subtree, builds it once,
   and gets enter()/exit() hooks from the UIManager.
   ════════════════════════════════════════════════════════════ */
class Screen {
  constructor(game, id) {
    this.game = game;
    this.el = document.createElement('div');
    this.el.className = 'screen';
    this.el.id = id;
  }
  build() {}                       // create DOM, bind events (once)
  enter(payload) {}                // state entered
  exit() {}                        // state left
  show() { this.el.classList.add('is-active'); }
  hide() { this.el.classList.remove('is-active'); }

  /* helpers */
  btn(key, { primary = false, ghost = false } = {}) {
    const b = document.createElement('button');
    b.className = 'btn' + (primary ? ' btn--primary' : '') + (ghost ? ' btn--ghost' : '');
    const main = document.createElement('span');
    const sub = document.createElement('span');
    sub.className = 'bn';
    L10N.bind(main, key);                   // current language
    L10N.bind(sub, key, { sub: true });     // companion script
    b.append(main, sub);
    b.addEventListener('mouseenter', () => this.game.audio.uiHover());
    return b;
  }
  titleLockup(compact = false) {
    const d = document.createElement('div');
    d.className = 'title-lockup';
    d.innerHTML = `<span class="t-borof">বরফ</span><span class="t-pani">পানি</span>` +
      (compact ? '' : `<span class="t-latin">Borof · Pani</span>`);
    return d;
  }
}

/* ════════════════════════════════════════════════════════════
   src/ui/screens/LoadingScreen.js
   ════════════════════════════════════════════════════════════ */
class LoadingScreen extends Screen {
  constructor(game) { super(game, 'screen-loading'); }

  build() {
    this.el.appendChild(this.titleLockup());

    const wrap = document.createElement('div');
    wrap.className = 'load-bar-wrap';
    wrap.innerHTML = `
      <div class="load-bar" role="progressbar" aria-label="Loading"
           aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="load-bar-fill"></div>
      </div>
      <div class="load-drip"></div>
      <div class="load-status"></div>`;
    wrap.style.position = 'relative';
    this.el.appendChild(wrap);

    const tip = document.createElement('p');
    tip.className = 'load-tip';
    L10N.bind(tip, 'loadTip', { html: true });
    this.el.appendChild(tip);

    this._bar = wrap.querySelector('.load-bar');
    this._fill = wrap.querySelector('.load-bar-fill');
    this._status = wrap.querySelector('.load-status');
    this._status.textContent = L10N.t('starting');
    L10N.bind(this._bar, 'loading', { attr: 'aria-label' });
    this._drip = wrap.querySelector('.load-drip');
    this._dripCooldown = 0;

    this.game.bus.on('assets:progress', ({ ratio, label }) => {
      const pct = Math.round(ratio * 100);
      this._fill.style.width = pct + '%';
      this._bar.setAttribute('aria-valuenow', pct);
      this._status.textContent = label;
      this._meltDrip(pct);
    });
  }

  _meltDrip(pct) {
    // a droplet falls from the bar's leading edge as the "ice" melts forward
    const now = performance.now();
    if (now - this._dripCooldown < 380) return;
    this._dripCooldown = now;
    const barWidth = this._bar.clientWidth;
    this._drip.style.left = Math.max(0, (pct / 100) * barWidth - 6) + 'px';
    this._drip.style.animation = 'none';
    void this._drip.offsetWidth;                 // restart the keyframes
    this._drip.style.animation = 'drip-fall .5s ease-in forwards';
  }
}

/* ════════════════════════════════════════════════════════════
   src/ui/screens/SettingsScreen.js
   Edits GameConfig.settings live; audio + renderer react through
   the bus immediately (no Apply button needed).
   ════════════════════════════════════════════════════════════ */
class SettingsScreen extends Screen {
  constructor(game) { super(game, 'screen-settings'); }

  build() {
    const rail = document.createElement('div');
    rail.className = 'rail';

    const head = document.createElement('div');
    head.className = 'rail-head';
    const eyebrow = document.createElement('div');
    eyebrow.className = 'eyebrow';
    L10N.bind(eyebrow, 'settings');
    head.append(eyebrow, this.titleLockup(true));
    rail.appendChild(head);

    const body = document.createElement('div');
    body.className = 'rail-body';

    body.appendChild(this._languageRow());
    body.appendChild(this._slider('masterVolume', 'masterVolume'));
    body.appendChild(this._slider('music', 'musicVolume'));
    body.appendChild(this._slider('sound', 'sfxVolume'));
    body.appendChild(this._segmented('graphics',
      [['low', 'low'], ['medium', 'medium'], ['high', 'high']],
      () => GameConfig.settings.graphicsQuality,
      (v) => {
        GameConfig.settings.graphicsQuality = v;
        this.game.bus.emit('settings:graphics', v);
      }));
    body.appendChild(this._slider('cameraSensitivity', 'cameraSensitivity',
      'cameraNote'));
    body.appendChild(this._segmented('fpsMeter',
      [[false, 'hidden'], [true, 'shown']],
      () => GameConfig.settings.showFps,
      (v) => {
        GameConfig.settings.showFps = v;
        document.getElementById('fps-meter')
          .classList.toggle('is-visible', v);
      }));

    const backBtn = this.btn('back', { ghost: true });
    backBtn.style.marginTop = '.8rem';
    backBtn.addEventListener('click', () => {
      this.game.audio.uiBack();
      this.game.state.setState(GameState.MAIN_MENU);
    });
    body.appendChild(backBtn);
    rail.appendChild(body);

    const foot = document.createElement('div');
    foot.className = 'rail-foot';
    const note = document.createElement('span');
    L10N.bind(note, 'instantNote');
    const ver = document.createElement('span');
    ver.textContent = 'v' + GameConfig.version;
    foot.append(note, ver);
    rail.appendChild(foot);

    this.el.appendChild(rail);
  }

  _slider(labelKey, key, noteKey = null) {
    const wrap = document.createElement('div');
    wrap.className = 'setting';
    const val = GameConfig.settings[key];
    const labelRow = document.createElement('div');
    labelRow.className = 'setting-label';
    const name = document.createElement('span');
    L10N.bind(name, labelKey);
    const readout = document.createElement('span');
    readout.className = 'val';
    readout.textContent = Math.round(val * 100) + '%';
    labelRow.append(name, readout);
    wrap.appendChild(labelRow);
    const input = document.createElement('input');
    input.type = 'range';
    input.min = '0'; input.max = '100';
    input.value = String(Math.round(val * 100));
    L10N.bind(input, labelKey, { attr: 'aria-label' });
    const paint = () => input.style.setProperty('--fill', input.value + '%');
    paint();
    input.addEventListener('input', () => {
      GameConfig.settings[key] = input.value / 100;
      readout.textContent = input.value + '%';
      paint();
      this.game.bus.emit('settings:volume');
    });
    wrap.appendChild(input);
    if (noteKey) {
      const n = document.createElement('div');
      n.style.cssText = 'font-size:.7rem;color:var(--cloth-dim);font-style:italic;';
      L10N.bind(n, noteKey);
      wrap.appendChild(n);
    }
    return wrap;
  }

  /* Language selector — flags + native names, selection highlighted,
     switches every bound string instantly and persists the choice. */
  _languageRow() {
    const wrap = document.createElement('div');
    wrap.className = 'setting';
    const labelRow = document.createElement('div');
    labelRow.className = 'setting-label';
    const name = document.createElement('span');
    L10N.bind(name, 'language');
    labelRow.appendChild(name);
    wrap.appendChild(labelRow);

    const seg = document.createElement('div');
    seg.className = 'seg seg--lang';
    seg.setAttribute('role', 'group');
    L10N.bind(seg, 'language', { attr: 'aria-label' });
    const buttons = L10N.languages().map((meta) => {
      const b = document.createElement('button');
      b.textContent = meta.flag + ' ' + meta.label;   // names stay in their own script
      b.addEventListener('click', () => {
        this.game.audio.uiClick();
        L10N.setLanguage(meta.code);
        sync();
      });
      seg.appendChild(b);
      return { b, code: meta.code };
    });
    const sync = () => {
      for (const { b, code } of buttons) b.classList.toggle('is-on', code === L10N.language);
    };
    sync();
    wrap.appendChild(seg);
    return wrap;
  }

  _segmented(labelKey, options, getVal, setVal) {
    const wrap = document.createElement('div');
    wrap.className = 'setting';
    const labelRow = document.createElement('div');
    labelRow.className = 'setting-label';
    const name = document.createElement('span');
    L10N.bind(name, labelKey);
    labelRow.appendChild(name);
    wrap.appendChild(labelRow);
    const seg = document.createElement('div');
    seg.className = 'seg';
    seg.setAttribute('role', 'group');
    L10N.bind(seg, labelKey, { attr: 'aria-label' });
    const buttons = options.map(([value, textKey]) => {
      const b = document.createElement('button');
      L10N.bind(b, textKey);
      b.addEventListener('click', () => {
        this.game.audio.uiClick();
        setVal(value);
        sync();
      });
      seg.appendChild(b);
      return { b, value };
    });
    const sync = () => {
      const cur = getVal();
      for (const { b, value } of buttons) b.classList.toggle('is-on', value === cur);
    };
    sync();
    wrap.appendChild(seg);
    return wrap;
  }
}

/* ════════════════════════════════════════════════════════════
   src/ui/screens/PlayerCountScreen.js
   Pick 6 / 7 / 8 players. On start, GameManager prepares the
   match (roster + lottery) and the ready panel confirms it —
   the last stop before the gameplay build takes over.
   ════════════════════════════════════════════════════════════ */
class PlayerCountScreen extends Screen {
  constructor(game) {
    super(game, 'screen-player-select');
    this._selected = null;
  }

  build() {
    const rail = document.createElement('div');
    rail.className = 'rail';

    const head = document.createElement('div');
    head.className = 'rail-head';
    const eyebrow = document.createElement('div');
    eyebrow.className = 'eyebrow';
    L10N.bind(eyebrow, 'howMany');
    head.append(eyebrow, this.titleLockup(true));
    rail.appendChild(head);

    const body = document.createElement('div');
    body.className = 'rail-body';

    const grid = document.createElement('div');
    grid.className = 'count-grid';
    this._cards = GameConfig.players.allowedCounts.map((count) => {
      const card = document.createElement('button');
      card.className = 'count-card';
      const num = document.createElement('span');
      num.className = 'num';
      L10N.bindFn(num, (loc) => loc.digit(count));
      const sub = document.createElement('span');
      sub.className = 'sub';
      L10N.bindFn(sub, (loc) => loc.t('youPlusBots', { n: loc.digit(count - 1) }));
      L10N.bind(card, 'players' + count, { attr: 'aria-label' });
      card.append(num, sub);
      card.addEventListener('mouseenter', () => this.game.audio.uiHover());
      card.addEventListener('click', () => {
        this.game.audio.uiClick();
        this._selected = count;
        this._sync();
      });
      grid.appendChild(card);
      return { card, count };
    });
    body.appendChild(grid);

    this._startBtn = this.btn('startMatch', { primary: true });
    this._startBtn.disabled = true;
    this._startBtn.addEventListener('click', () => {
      if (this._selected === null) return;
