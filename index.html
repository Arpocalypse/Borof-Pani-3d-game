      this.game.audio.uiConfirm();
      this.game.manager.prepareMatch(this._selected);
    });
    body.appendChild(this._startBtn);

    this._panel = document.createElement('div');
    this._panel.className = 'match-panel';
    this._panel.style.display = 'none';
    body.appendChild(this._panel);

    this._enterBtn = this.btn('enterPlayground', { primary: true });
    this._enterBtn.style.display = 'none';
    this._enterBtn.addEventListener('click', () => {
      this.game.audio.uiConfirm();
      this.game.manager.enterPlayground();
    });
    body.appendChild(this._enterBtn);

    const backBtn = this.btn('back', { ghost: true });
    backBtn.addEventListener('click', () => {
      this.game.audio.uiBack();
      const st = this.game.state;
      // MATCH_SETUP and PLAYER_SELECT both route home from here
      st.setState(GameState.MAIN_MENU);
    });
    body.appendChild(backBtn);
    rail.appendChild(body);

    const foot = document.createElement('div');
    foot.className = 'rail-foot';
    const tagline = document.createElement('span');
    L10N.bind(tagline, 'oneChor');
    const ver = document.createElement('span');
    ver.textContent = 'v' + GameConfig.version;
    foot.append(tagline, ver);
    rail.appendChild(foot);

    this.el.appendChild(rail);

    // GameManager reports the prepared match; render the ready panel.
    this.game.bus.on('match:prepared', (match) => this._showMatch(match));
    // if the panel is open when the language changes, redraw it
    this.game.bus.on('locale:changed', () => {
      if (this._lastMatch && this._panel.style.display !== 'none') {
        this._showMatch(this._lastMatch);
      }
    });
  }

  enter() {
    this._selected = null;
    this._lastMatch = null;
    this._panel.style.display = 'none';
    if (this._enterBtn) this._enterBtn.style.display = 'none';
    this._sync();
  }

  _sync() {
    for (const { card, count } of this._cards) {
      card.classList.toggle('is-on', count === this._selected);
    }
    this._startBtn.disabled = this._selected === null;
  }

  _showMatch(match) {
    this._lastMatch = match;
    const { roster, lottery } = match;
    const chor = roster.find((p) => p.id === lottery.chorId);
    const chips = roster.map((p) => {
      const cls = (p.id === lottery.chorId ? ' class="is-chor"'
                 : p.isHuman ? ' class="is-you"' : '');
      const hex = '#' + p.color.toString(16).padStart(6, '0');
      return `<span${cls}><i style="--dot:${hex}"></i>${p.name}</span>`;
    }).join('');
    const how = lottery.mode === 'rhyme'
      ? L10N.t('countedOut', { rhyme: lottery.rhymeText, n: L10N.digit(lottery.rounds.length) })
      : L10N.t('drawnRandom');
    this._panel.innerHTML = `
      <div class="chor-line">${L10N.t('catcher')}: ${chor.name}</div>
      <div>${how}</div>
      <div class="roster-chips">${chips}</div>
      <div class="match-note">${L10N.t('matchNote')}</div>`;
    this._panel.style.display = 'block';
    this._enterBtn.style.display = 'flex';
  }
}

/* ════════════════════════════════════════════════════════════
   src/managers/UIManager.js
   Maps game states → screens and drives transitions off the
   state machine. Screens never show/hide themselves.
   ════════════════════════════════════════════════════════════ */
class UIManager {
  constructor(bus, rootEl) {
    this.bus = bus;
    this.rootEl = rootEl;
    this._screens = new Map();     // GameState → Screen
    this._active = null;

    bus.on('state:changed', ({ to, payload }) => this._onState(to, payload));
  }

  register(state, screen) {
    screen.build();
    this.rootEl.appendChild(screen.el);
    this._screens.set(state, screen);
  }

  /* Map an additional state to an already-registered screen
     (e.g. MATCH_SETUP re-uses the player-select screen). */
  alias(state, screen) {
    this._screens.set(state, screen);
  }

  _onState(state, payload) {
    const next = this._screens.get(state);
    if (next === this._active) return;
    if (this._active) { this._active.exit(); this._active.hide(); }
    this._active = next || null;
    if (this._active) { this._active.enter(payload); this._active.show(); }
  }
}
</script>
<script>
/* ════════════════════════════════════════════════════════════
   src/core/InputManager.js                              (v0.4.0)
   Keyboard + pointer-lock mouse state. Deltas accumulate between
   fixed-timestep updates and are consumed once per tick, so
   control response is frame-rate independent. If pointer lock is
   unavailable (sandboxed hosts), falls back to drag-to-look.
   ════════════════════════════════════════════════════════════ */
class InputManager {
  constructor(bus, canvas) {
    this.bus = bus;
    this.canvas = canvas;
    this.enabled = false;
    this.pointerLocked = false;
    this._keys = new Set();
    this._dx = 0; this._dy = 0;
    this._wheel = 0;
    this._jumpQueued = false;
    this._fallbackDrag = false;      // set when pointer lock is denied

    window.addEventListener('keydown', (e) => {
      if (!this.enabled) return;
      if (e.code === 'Space' && !e.repeat) this._jumpQueued = true;
      this._keys.add(e.code);
      if (e.code === 'Space' || e.code.startsWith('Arrow')) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => this._keys.delete(e.code));
    window.addEventListener('blur', () => this._keys.clear());

    document.addEventListener('mousemove', (e) => {
      if (!this.enabled) return;
      if (this.pointerLocked || (this._fallbackDrag && (e.buttons & 1))) {
        this._dx += e.movementX;
        this._dy += e.movementY;
      }
    });
    window.addEventListener('wheel', (e) => {
      if (this.enabled && (this.pointerLocked || this._fallbackDrag)) this._wheel += e.deltaY;
    }, { passive: true });

    document.addEventListener('pointerlockchange', () => {
      this.pointerLocked = document.pointerLockElement === this.canvas;
      this.bus.emit('input:pointerlock', { locked: this.pointerLocked });
    });
    document.addEventListener('pointerlockerror', () => {
      this._fallbackDrag = true;     // host refused the lock — drag-look instead
    });
  }

  setEnabled(on) {
    this.enabled = on;
    if (!on) {
      this._keys.clear();
      this._dx = this._dy = this._wheel = 0;
      this._jumpQueued = false;
    }
  }

  requestPointerLock() {
    if (this.canvas.requestPointerLock) {
      try { this.canvas.requestPointerLock(); } catch (_) { this._fallbackDrag = true; }
    } else this._fallbackDrag = true;
  }

  isDown(code) { return this._keys.has(code); }
  consumeMouseDelta() { const d = { dx: this._dx, dy: this._dy }; this._dx = 0; this._dy = 0; return d; }
  consumeWheel() { const w = this._wheel; this._wheel = 0; return w; }
  consumeJump() { const j = this._jumpQueued; this._jumpQueued = false; return j; }
}

/* ════════════════════════════════════════════════════════════
   src/systems/CollisionSystem.js
   Planar collision for the player (circle vs circles + AABBs)
   and 3D occlusion clamping for the follow camera. The collider
   table mirrors the environment layout in EnvironmentManager /
   GameConfig — the environment meshes themselves are untouched.
   ════════════════════════════════════════════════════════════ */
class CollisionSystem {
  constructor() {
    this._circles = [];   // { x, z, r, h }
    this._aabbs = [];     // { minX, maxX, minZ, maxZ, h }
    this._build();
  }

  _build() {
    const f = GameConfig.world.field;
    const circle = (x, z, r, h = 3) => this._circles.push({ x, z, r, h });
    const aabb = (minX, maxX, minZ, maxZ, h = 2) =>
      this._aabbs.push({ minX, maxX, minZ, maxZ, h });

    // school building (plinth footprint) + front steps
    aabb(-14.1, 14.1, -26.6, -17.4, 5.4);
    aabb(-2.05, 2.05, -17.4, -16.1, 0.6);
    // playground equipment pads
    aabb(-31.0, -29.0, -8.7, -5.3, 2.5);            // swing set
    aabb(-31.9, -28.1, 0.55, 1.45, 0.8);            // seesaw plank
    aabb(-30.6, -29.4, 5.0, 9.3, 1.7);              // slide
    // football goals — posts at both ends
    for (const s of [-1, 1]) {
      circle(f.cx + s * f.halfW, f.cz - 1.8, 0.16, 1.8);
      circle(f.cx + s * f.halfW, f.cz + 1.8, 0.16, 1.8);
    }
    // flag pole
    circle(9, -14.5, 0.14, 6.5);
    // benches
    for (const [x, z] of [[17.5, -9], [20.5, -7], [-16, -14], [22.5, 15], [-24.5, 13]]) {
      circle(x, z, 0.72, 1.0);
    }
    // tree trunks inside the compound (leaf trees, then palms)
    for (const [x, z, r] of [[18, -7, 0.3], [-17, -12, 0.27], [34, -25, 0.3],
                             [-37, -24, 0.27], [36, 24, 0.27]]) circle(x, z, r, 3.2);
    for (const [x, z] of [[-38, 27], [-12, 28.5], [14, 28], [38, 26], [7, 30.5], [-33, -28]]) {
      circle(x, z, 0.2, 4.5);
    }
  }

  /* Push a player circle out of every collider and keep it inside
     the boundary wall. Two passes settle corner cases. */
  resolvePlayer(pos, radius) {
    const cw = GameConfig.world.compound;
    const m = 0.8 + radius;                          // wall thickness + body
    pos.x = THREE.MathUtils.clamp(pos.x, -cw.halfW + m, cw.halfW - m);
    pos.z = THREE.MathUtils.clamp(pos.z, -cw.halfD + m, cw.halfD - m);

    for (let pass = 0; pass < 2; pass++) {
      for (const c of this._circles) {
        const dx = pos.x - c.x, dz = pos.z - c.z;
        const rr = c.r + radius;
        const d2 = dx * dx + dz * dz;
        if (d2 < rr * rr) {
          const d = Math.sqrt(d2) || 0.0001;
          pos.x = c.x + (dx / d) * rr;
          pos.z = c.z + (dz / d) * rr;
        }
      }
      for (const b of this._aabbs) {
        const cx = THREE.MathUtils.clamp(pos.x, b.minX, b.maxX);
        const cz = THREE.MathUtils.clamp(pos.z, b.minZ, b.maxZ);
        const dx = pos.x - cx, dz = pos.z - cz;
        const d2 = dx * dx + dz * dz;
        if (d2 > 0) {                                // outside — push off the face
          if (d2 < radius * radius) {
            const d = Math.sqrt(d2);
            pos.x = cx + (dx / d) * radius;
            pos.z = cz + (dz / d) * radius;
          }
        } else {                                     // inside — eject via nearest face
          const west = pos.x - b.minX, east = b.maxX - pos.x;
          const north = pos.z - b.minZ, south = b.maxZ - pos.z;
          const min = Math.min(west, east, north, south);
          if (min === west) pos.x = b.minX - radius;
          else if (min === east) pos.x = b.maxX + radius;
          else if (min === north) pos.z = b.minZ - radius;
          else pos.z = b.maxZ + radius;
        }
      }
    }

    // Gameplay is restricted to the circular playground (the chalk ring
    // EnvironmentManager already draws at this same radius) — this is the
    // real boundary for both the human and every AI player.
    const R = GameConfig.world.courtyardRadius - radius - 0.1;
    const d = Math.hypot(pos.x, pos.z);
    if (d > R) {
      const s = R / d;
      pos.x *= s;
      pos.z *= s;
    }
  }

  _cameraBlocked(x, y, z, r) {
    const cw = GameConfig.world.compound;
    // low camera stays inside the boundary wall; high camera may clear it
    if (y < 2.3 && (Math.abs(x) > cw.halfW - 0.4 || Math.abs(z) > cw.halfD - 0.4)) return true;
    for (const b of this._aabbs) {
      if (y < b.h &&
          x > b.minX - r && x < b.maxX + r &&
          z > b.minZ - r && z < b.maxZ + r) return true;
    }
    for (const c of this._circles) {
      if (c.r < 0.25) continue;                      // thin poles don't occlude
      if (y < c.h) {
        const dx = x - c.x, dz = z - c.z, rr = c.r + r;
        if (dx * dx + dz * dz < rr * rr) return true;
      }
    }
    return false;
  }

  /* Walk from the look target toward the desired camera position and
     stop just short of the first obstruction. `out` may alias `desired`. */
  clampCamera(target, desired, radius, out) {
    const dx = desired.x - target.x, dy = desired.y - target.y, dz = desired.z - target.z;
    const steps = 24;
    let good = 1;
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      if (this._cameraBlocked(target.x + dx * t, target.y + dy * t, target.z + dz * t, radius)) {
        good = (i - 1) / steps;
        break;
      }
    }
    const t = Math.max(0.18, good);
    out.set(target.x + dx * t, target.y + dy * t, target.z + dz * t);
    return out;
  }
}

/* ════════════════════════════════════════════════════════════
   src/entities/PlayerAvatar.js
   A procedural schoolkid — white shirt, navy shorts — with a
   jointed rig (head, shoulders, hips) driven entirely by pose
   blending: Idle, Walk, Run and Jump poses are mixed by smooth
   weights every frame, so transitions never snap.
   ════════════════════════════════════════════════════════════ */
class PlayerAvatar {
  constructor(accentColor = 0xe8a33d) {
    this.root = new THREE.Group();          // world position (owned by the controller)
    this.rig = new THREE.Group();           // facing + lean + squash
    this.root.add(this.rig);

    const skin = new THREE.MeshLambertMaterial({ color: 0xb27a50 });
    const shirt = new THREE.MeshLambertMaterial({ color: 0xf2efe6 });
    const shorts = new THREE.MeshLambertMaterial({ color: 0x2b3a5e });
    const hair = new THREE.MeshLambertMaterial({ color: 0x241d18 });
    const accent = new THREE.MeshLambertMaterial({ color: accentColor });
    const mesh = (geo, mat, parent, x, y, z) => {
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z);
      m.castShadow = true;
      parent.add(m);
      return m;
    };

    // legs — pivots at the hip so swings read correctly
    this.legL = new THREE.Group(); this.legL.position.set(-0.09, 0.62, 0);
    this.legR = new THREE.Group(); this.legR.position.set(0.09, 0.62, 0);
    mesh(new THREE.BoxGeometry(0.11, 0.5, 0.13), skin, this.legL, 0, -0.26, 0);
    mesh(new THREE.BoxGeometry(0.11, 0.5, 0.13), skin, this.legR, 0, -0.26, 0);
    this.rig.add(this.legL, this.legR);

    // torso + shorts + accent scarf knot (ties into the roster color)
    mesh(new THREE.BoxGeometry(0.34, 0.44, 0.2), shirt, this.rig, 0, 0.84, 0);
    mesh(new THREE.BoxGeometry(0.36, 0.17, 0.22), shorts, this.rig, 0, 0.66, 0);
    mesh(new THREE.BoxGeometry(0.1, 0.08, 0.06), accent, this.rig, 0, 1.02, 0.11);

    // arms — pivots at the shoulder, sleeve caps in shirt cloth
    this.armL = new THREE.Group(); this.armL.position.set(-0.22, 1.0, 0);
    this.armR = new THREE.Group(); this.armR.position.set(0.22, 1.0, 0);
    for (const arm of [this.armL, this.armR]) {
      mesh(new THREE.BoxGeometry(0.09, 0.4, 0.11), skin, arm, 0, -0.2, 0);
      mesh(new THREE.BoxGeometry(0.11, 0.13, 0.13), shirt, arm, 0, -0.045, 0);
      this.rig.add(arm);
    }

    // head + hair cap
    this.head = new THREE.Group(); this.head.position.set(0, 1.2, 0);
    mesh(new THREE.SphereGeometry(0.155, 12, 10), skin, this.head, 0, 0, 0);
    const cap = mesh(new THREE.SphereGeometry(0.16, 12, 8, 0, Math.PI * 2, 0, Math.PI * 0.55),
      hair, this.head, 0, 0.02, -0.015);
    cap.rotation.x = -0.15;
    this.rig.add(this.head);
  }

  setFacing(yaw) { this.rig.rotation.y = yaw; }

  /* Floating name label, always facing the camera (a THREE.Sprite bills
     itself toward the camera automatically — no per-frame rotation code
     needed). Shows the player's name, a red "CATCHER" tag above it when
     they're the chor, and a blue frozen indicator below it when iced.
     Built once per avatar; only redrawn when state actually changes. */
  attachLabel(name) {
    this._labelName = name;
    this._labelState = { isCatcher: false, isFrozen: false };
    const cv = document.createElement('canvas');
    cv.width = 320; cv.height = 140;
    this._labelCtx = cv.getContext('2d');
    this._labelTex = new THREE.CanvasTexture(cv);
    this._labelTex.encoding = THREE.sRGBEncoding;
    const mat = new THREE.SpriteMaterial({
      map: this._labelTex, transparent: true, depthWrite: false, sizeAttenuation: true,
    });
    this._label = new THREE.Sprite(mat);
    this._label.scale.set(1.5, 0.656, 1);
    this._label.position.set(0, 2.05, 0);
    this.root.add(this._label);
    this._redrawLabel();
  }

  /* Merge new flags into the label's state and redraw only if something
     actually changed — freeze/thaw and catcher assignment are infrequent
     events, so this stays effectively free during normal play. */
  setLabelState(partial) {
    if (!this._labelState) return;
    let changed = false;
    for (const k of Object.keys(partial)) {
      if (this._labelState[k] !== partial[k]) { this._labelState[k] = partial[k]; changed = true; }
    }
    if (changed) this._redrawLabel();
  }

  _redrawLabel() {
    const ctx = this._labelCtx;
    if (!ctx) return;
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    let y = H / 2;
    const rows = [];
    if (this._labelState.isCatcher) rows.push({ text: L10N.t('catcher').toUpperCase(), color: '#e0453a', size: 30 });
    rows.push({ text: this._labelName, color: '#f5f1e4', size: 34, outline: true });
    if (this._labelState.isFrozen) rows.push({ text: L10N.t('frozen'), color: '#7fd6e8', size: 28 });

    const totalH = rows.reduce((s, r) => s + r.size * 1.15, 0);
    y = H / 2 - totalH / 2;
    for (const r of rows) {
      y += r.size * 1.15 * 0.5;
      ctx.font = `700 ${r.size}px 'Hind Siliguri', 'Noto Sans KR', sans-serif`;
      if (r.outline) {
        ctx.lineWidth = 6;
        ctx.strokeStyle = 'rgba(10, 22, 21, .85)';
        ctx.strokeText(r.text, W / 2, y);
      } else {
        ctx.lineWidth = 4;
        ctx.strokeStyle = 'rgba(10, 22, 21, .7)';
        ctx.strokeText(r.text, W / 2, y);
      }
      ctx.fillStyle = r.color;
      ctx.fillText(r.text, W / 2, y);
      y += r.size * 1.15 * 0.5;
    }
    this._labelTex.needsUpdate = true;
  }

  /* Pose blending. ctx: { time, phase, moveW, runMix, airW, land01, turn } */
  animate(dt, c) {
    const idleW = Math.max(0, (1 - c.moveW) * (1 - c.airW));
    const swing = Math.sin(c.phase);
    const legAmp = 0.5 + 0.42 * c.runMix;
    const armAmp = 0.42 + 0.5 * c.runMix;
    const breathe = Math.sin(c.time * 1.9);

    // hips: walk/run scissor · jump tuck · landing crouch
    const crouch = c.land01 * 0.5;
    this.legL.rotation.x = c.moveW * swing * legAmp + c.airW * -0.62 + crouch;
    this.legR.rotation.x = c.moveW * -swing * legAmp + c.airW * -0.3 + crouch;

    // shoulders: counter-swing · idle sway · jump reach-back
    this.armL.rotation.x = c.moveW * -swing * armAmp + c.airW * -0.85;
    this.armR.rotation.x = c.moveW * swing * armAmp + c.airW * -0.85;
    const flare = idleW * (0.07 + 0.03 * breathe) + c.airW * 0.5 + c.runMix * 0.12;
    this.armL.rotation.z = flare;
    this.armR.rotation.z = -flare;

    // head: idle look-around, steadied while running
    this.head.rotation.y = idleW * Math.sin(c.time * 0.6) * 0.25;
    this.head.rotation.x = c.runMix * 0.12 - c.airW * 0.1;

    // body: step bob, sprint lean, banking into turns, landing squash
    const bob = c.moveW * Math.abs(Math.sin(c.phase)) * 0.05 + idleW * breathe * 0.008;
    this.rig.position.y = bob - c.land01 * 0.09;
    this.rig.rotation.x = c.moveW * 0.06 + c.runMix * 0.1 + c.land01 * 0.12 - c.airW * 0.06;
    this.rig.rotation.z = THREE.MathUtils.clamp(-c.turn * 0.5, -0.14, 0.14) * c.moveW;
    const squash = 1 - c.land01 * 0.16;
    this.rig.scale.set(1 + c.land01 * 0.08, squash, 1 + c.land01 * 0.08);
  }

  /* Bracing frozen stance with a faint shiver — the gameplay build's
     frozen animation, shared by bots and the human alike. */
  poseFrozen(dt, t) {
    const sh = Math.sin(t * 34) * 0.015;
    this.legL.rotation.x = 0.06 + sh;
    this.legR.rotation.x = -0.06 - sh;
    this.armL.rotation.x = 0.42;
    this.armR.rotation.x = 0.42;
    this.armL.rotation.z = 0.5;
    this.armR.rotation.z = -0.5;
    this.head.rotation.x = 0.12;
    this.head.rotation.y = sh * 2;
    this.rig.rotation.x = 0.1;
    this.rig.rotation.z = sh;
    this.rig.position.y = 0;
    this.rig.scale.set(1, 0.97, 1);
  }

  dispose() {
    if (this._labelTex) this._labelTex.dispose();
    this.root.traverse((o) => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
  }
}

/* ════════════════════════════════════════════════════════════
   src/managers/PlayerController.js
   Third-person character control: camera-relative WASD, sprint,
   jump with coyote time + input buffering, gravity, landing
   recovery, damped facing, environment collision, and the
   animation-state feed. All motion is delta-time scaled and runs
   inside the fixed-timestep loop. AI and Borof-Pani rules are
   deliberately absent — this build is locomotion only.
   ════════════════════════════════════════════════════════════ */
class PlayerController {
  constructor(game) {
    this.game = game;
    this.avatar = null;
    this.velocity = new THREE.Vector3();
    this.grounded = true;
    this._facing = Math.PI;
    this._phase = 0;
    this._time = 0;
    this._w = { move: 0, run: 0, air: 0 };
    this._landTimer = 0;
    this._coyote = 0;
    this._jumpBuffer = 0;
    this.frozen = false;               // set by the RoundSystem on tag / rescue
  }

  get object3d() { return this.avatar ? this.avatar.root : null; }

  spawnIfNeeded(accentColor, name) {
    if (this.avatar) return;
    this.avatar = new PlayerAvatar(accentColor);
    const s = GameConfig.player.spawn;
    this.avatar.root.position.set(s.x, 0, s.z);
    this._facing = Math.PI;                          // facing the school
    this.avatar.setFacing(this._facing);
    if (name) this.avatar.attachLabel(name);
    this.velocity.set(0, 0, 0);
    this.grounded = true;
    this._phase = 0;
    this._w = { move: 0, run: 0, air: 0 };
    this._landTimer = this._coyote = this._jumpBuffer = 0;
    this.frozen = false;
    this.game.sceneManager.add(this.avatar.root);
  }

  despawn() {
    if (!this.avatar) return;
    this.game.sceneManager.remove(this.avatar.root);
    this.avatar.dispose();
    this.avatar = null;
  }

  /* Back to the spawn mark for a fresh round (Restart). */
  resetToSpawn() {
    if (!this.avatar) return;
    const s = GameConfig.player.spawn;
    this.avatar.root.position.set(s.x, 0, s.z);
    this.velocity.set(0, 0, 0);
    this.grounded = true;
    this.frozen = false;
    this._landTimer = this._coyote = this._jumpBuffer = 0;
    this._facing = Math.PI;
    this.avatar.setFacing(this._facing);
    this.avatar.rig.scale.set(1, 1, 1);
    this.avatar.rig.rotation.set(0, 0, 0);
  }

  update(dt) {
    if (!this.avatar) return;
    this._time += dt;

    // Frozen: no moving, jumping or sprinting — but your eyes still work.
    if (this.frozen) {
      if (this.game.state.is(GameState.PLAYING)) {
        const look = this.game.input.consumeMouseDelta();
        if (look.dx || look.dy) this.game.cameraController.addLook(look.dx, look.dy);
        const wheel = this.game.input.consumeWheel();
        if (wheel) this.game.cameraController.addZoom(wheel);
        this.game.input.consumeJump();           // no jumping out of the ice
      }
      this.velocity.set(0, 0, 0);
      this.avatar.poseFrozen(dt, this._time);
      return;
    }

    const P = GameConfig.player;
    const input = this.game.input;
    const playing = this.game.state.is(GameState.PLAYING);

    // ── camera feed: mouse look (360°) + wheel distance ──
    if (playing) {
      const { dx, dy } = input.consumeMouseDelta();
      if (dx || dy) this.game.cameraController.addLook(dx, dy);
      const wheel = input.consumeWheel();
      if (wheel) this.game.cameraController.addZoom(wheel);
    }

    // ── movement intent, relative to the camera ──
    let ix = 0, iz = 0;
    if (playing) {
      ix = (input.isDown('KeyD') ? 1 : 0) - (input.isDown('KeyA') ? 1 : 0);
      iz = (input.isDown('KeyW') ? 1 : 0) - (input.isDown('KeyS') ? 1 : 0);
    }
    const yaw = this.game.cameraController.yaw;
    const fx = -Math.sin(yaw), fz = -Math.cos(yaw);   // camera forward on the ground
    const rx = Math.cos(yaw), rz = -Math.sin(yaw);    // camera right
    let mx = fx * iz + rx * ix;
    let mz = fz * iz + rz * ix;
    const len = Math.hypot(mx, mz);
    if (len > 0) { mx /= len; mz /= len; }

    const sprinting = playing && len > 0 &&
      (input.isDown('ShiftLeft') || input.isDown('ShiftRight'));
    const landSlow = this._landTimer > 0
      ? 0.55 + 0.45 * (1 - this._landTimer / P.landRecovery) : 1;
    const targetSpeed = (len > 0 ? (sprinting ? P.runSpeed : P.walkSpeed) : 0) * landSlow;

    // exponential approach → frame-rate independent acceleration
    const rate = len > 0 ? P.accel : P.decel;
    const k = 1 - Math.exp(-rate * dt);
    this.velocity.x += (mx * targetSpeed - this.velocity.x) * k;
    this.velocity.z += (mz * targetSpeed - this.velocity.z) * k;

    // ── jump: coyote time + input buffer for responsive feel ──
    this._coyote = this.grounded ? P.coyoteTime : Math.max(0, this._coyote - dt);
    if (playing && input.consumeJump()) this._jumpBuffer = P.jumpBuffer;
    else this._jumpBuffer = Math.max(0, this._jumpBuffer - dt);
    if (this._jumpBuffer > 0 && this._coyote > 0) {
      this.velocity.y = P.jumpVelocity;
      this.grounded = false;
      this._coyote = 0;
      this._jumpBuffer = 0;
    }
    if (!this.grounded) this.velocity.y -= P.gravity * dt;

    // ── integrate + ground contact with landing recovery ──
    const pos = this.avatar.root.position;
    pos.x += this.velocity.x * dt;
    pos.z += this.velocity.z * dt;
    pos.y += this.velocity.y * dt;
    if (pos.y <= 0) {
      if (!this.grounded) {
        this._landTimer = P.landRecovery *
          Math.min(1, -this.velocity.y / P.jumpVelocity);
      }
      pos.y = 0;
      this.velocity.y = 0;
      this.grounded = true;
    }
    this._landTimer = Math.max(0, this._landTimer - dt);

    // ── environment collision: props + boundary wall ──
    this.game.collision.resolvePlayer(pos, P.radius);

    // ── face the direction of travel (shortest arc, damped) ──
    let turn = 0;
    if (len > 0.001) {
      const target = Math.atan2(mx, mz);
      let d = target - this._facing;
      d = Math.atan2(Math.sin(d), Math.cos(d));
      this._facing += d * Math.min(1, P.turnRate * dt);
      turn = d;
    }
    this.avatar.setFacing(this._facing);

    // ── animation state: smooth weights, distance-driven gait ──
    const planar = Math.hypot(this.velocity.x, this.velocity.z);
    const wk = 1 - Math.exp(-10 * dt);
    this._w.move += (THREE.MathUtils.clamp(planar / P.walkSpeed, 0, 1) - this._w.move) * wk;
    this._w.run += (THREE.MathUtils.clamp(
      (planar - P.walkSpeed) / (P.runSpeed - P.walkSpeed), 0, 1) - this._w.run) * wk;
    this._w.air += ((this.grounded ? 0 : 1) - this._w.air) * wk;
    this._phase += planar * dt * 2.15;
    const land01 = this._landTimer > 0
      ? Math.sin(Math.PI * this._landTimer / P.landRecovery) : 0;

    this.avatar.animate(dt, {
      time: this._time,
      phase: this._phase,
      moveW: this._w.move,
      runMix: this._w.run,
      airW: this._w.air,
      land01,
      turn,
    });
  }
}

/* ════════════════════════════════════════════════════════════
   src/ui/screens/HUDScreen.js
   In-world overlay for the PLAYING state — just the localized
   controls hint for now; gameplay widgets land in later builds.
   ════════════════════════════════════════════════════════════ */
class HUDScreen extends Screen {
  constructor(game) { super(game, 'screen-hud'); }

  build() {
    const hint = document.createElement('div');
    hint.className = 'hud-hint';
    L10N.bind(hint, 'controlsHint');
    this.el.appendChild(hint);

    // match stats: remaining time · frozen count · current catcher
    const bar = document.createElement('div');
    bar.className = 'hud-top';
    const cell = (labelKey) => {
      const c = document.createElement('div');
      c.className = 'hud-cell';
      const l = document.createElement('span');
      l.className = 'hud-label';
      L10N.bind(l, labelKey);
      const v = document.createElement('span');
      v.className = 'hud-value';
      c.append(l, v);
      bar.appendChild(c);
      return v;
    };
    this._timeEl = cell('timeRemaining');
    this._frozenEl = cell('frozen');
    this._activeEl = cell('active');
    this._catcherEl = cell('catcher');
    this._rescuesEl = cell('rescues');
    this.el.appendChild(bar);

    this._last = null;
    this.game.bus.on('round:tick', (t) => { this._last = t; this._render(); });
    this.game.bus.on('round:started', (s) => {
      this._catcherEl.textContent = s.catcherName;
    });
    this.game.bus.on('locale:changed', () => this._render());
  }

  _render() {
    if (!this._last) return;
    const s = Math.ceil(this._last.timeLeft);
    const mm = String(Math.floor(s / 60));
    const ss = String(s % 60).padStart(2, '0');
    this._timeEl.textContent = L10N.digit(mm) + ':' + L10N.digit(ss);
    this._frozenEl.textContent =
      L10N.digit(this._last.frozen) + ' / ' + L10N.digit(this._last.total);
    this._activeEl.textContent = L10N.digit(this._last.active);
    this._rescuesEl.textContent = L10N.digit(this._last.rescues);
  }
}

/* ════════════════════════════════════════════════════════════
   src/ui/screens/PauseScreen.js
   Shown when pointer lock releases (Esc) during play. Uses the
   pause / resume / mainMenu keys already in every language pack.
   ════════════════════════════════════════════════════════════ */
class PauseScreen extends Screen {
  constructor(game) { super(game, 'screen-pause'); }
  build() {
    const title = document.createElement('div');
    title.className = 'pause-title';
    L10N.bind(title, 'pause');
    this.el.appendChild(title);

    const panel = document.createElement('div');
    panel.className = 'pause-panel';
    const resumeBtn = this.btn('resume', { primary: true });
    resumeBtn.addEventListener('click', () => {
      this.game.audio.uiClick();
      this.game.state.setState(GameState.PLAYING);
    });
    const menuBtn = this.btn('mainMenu', { ghost: true });
    menuBtn.addEventListener('click', () => {
      this.game.audio.uiBack();
      this.game.state.setState(GameState.MAIN_MENU);
    });
    panel.append(resumeBtn, menuBtn);
    this.el.appendChild(panel);
  }
}
</script>

<script>
/* ════════════════════════════════════════════════════════════
   src/ai/                                              (v0.5.0)
   ├── Steering.js   shared steering fields + separation
   ├── BotBody.js    bot locomotion (same feel as the player)
   ├── RunnerAI.js   FSM: Idle · Wander · Escape · Rescue
   └── CatcherAI.js  FSM: Search · Chase · Intercept

   The brains never touch game rules. Reaching a frozen teammate
   emits 'ai:rescue-reach' and reaching a chase target emits
   'ai:tag-reach' — dormant hooks the gameplay build will connect
   to the FreezeSystem. Freezing, thawing and the lottery ceremony
   are deliberately absent from this build.

   Every brain reads the world through one accessor object built
   by the GameManager (positions, velocities, frozen state, brain
   states), so future gameplay systems reuse the AI unchanged.
   ════════════════════════════════════════════════════════════ */

/* ── src/ai/Steering.js ── */
const Steering = {
  _probe: { x: 0, z: 0 },

  /* Repulsion from the circular playground boundary, growing over the
     last few meters before the edge. Always points straight back toward
     the center, so an AI nearing the boundary is steered onto a new path
     inward rather than getting stuck skimming along an edge. */
  wallField(pos) {
    const R = GameConfig.world.courtyardRadius, m = 3.5;
    const d = Math.hypot(pos.x, pos.z);
    const edge = R - d;
    if (edge >= m || d < 1e-6) return { x: 0, z: 0 };
    const push = 1 - Math.max(0, edge) / m;
    return { x: -(pos.x / d) * push, z: -(pos.z / d) * push };
  },

  /* Obstacle probe: project a point ahead and let the existing
     CollisionSystem resolver push it; the push direction is the
     avoidance steering. Covers props AND walls with zero new
     collision code. Returns null when the path is clear. */
  avoid(pos, dirX, dirZ, world, lookAhead = 1.5) {
    const p = this._probe;
    p.x = pos.x + dirX * lookAhead;
    p.z = pos.z + dirZ * lookAhead;
    const ox = p.x, oz = p.z;
    world.collision.resolvePlayer(p, 0.42);
    const ax = p.x - ox, az = p.z - oz;
    const m = Math.hypot(ax, az);
    if (m < 1e-6) return null;
    return { x: ax / m, z: az / m, strength: Math.min(1, m / 0.42) };
  },

  /* Soft spacing between all bots (and off the human), then a hard
     overlap resolve and a re-clamp against the environment. */
  separate(bodies, world) {
    const R = GameConfig.ai.separationRadius;
    const rad = GameConfig.player.radius;
    for (let i = 0; i < bodies.length; i++) {
      for (let j = i + 1; j < bodies.length; j++) {
        const a = bodies[i].position, b = bodies[j].position;
        let dx = a.x - b.x, dz = a.z - b.z;
        let d = Math.hypot(dx, dz);
        if (d < R) {
          if (d < 1e-5) { dx = 1; dz = 0; d = 1; }
          const push = (R - d) * 0.5;
          dx /= d; dz /= d;
          a.x += dx * push; a.z += dz * push;
          b.x -= dx * push; b.z -= dz * push;
        }
      }
      const h = world.humanPosition();
      if (h) {
        const a = bodies[i].position;
        const dx = a.x - h.x, dz = a.z - h.z;
        const d = Math.hypot(dx, dz);
        // Below BOTH the AI's own tag reach (a bot catcher touching the
        // human) and the human's own reach (touching a bot) — otherwise
        // whichever direction of contact isn't covered can never register,
        // the same class of bug as the bot-vs-bot case above.
        const min = Math.min(GameConfig.ai.touchRadius,
          GameConfig.round.humanTouchRadius) - 0.1;
        if (d < min && d > 1e-5) {
          a.x = h.x + (dx / d) * min;
          a.z = h.z + (dz / d) * min;
        }
      }
      world.collision.resolvePlayer(bodies[i].position, rad);
    }
  },
};

/* ── src/ai/BotBody.js ── */
class BotBody {
  constructor(player, world) {
    this.player = player;
    this.world = world;
    this.avatar = world.avatarInstanceOf(player);   // built by PlayerManager.spawnRoster
    this.velocity = { x: 0, z: 0 };
    const p = this.avatar.root.position;
    this.facing = Math.atan2(-p.x, -p.z);           // spawned looking at the circle
    this._phase = 0;
    this._time = Math.random() * 10;                // desync idle breathing
    this._w = { move: 0, run: 0 };
    player._botBody = this;                          // runtime handle for accessors
  }

  get position() { return this.avatar.root.position; }

  /* Steer toward (dx, dz) at `speed` — the same exponential
     acceleration, facing damping and animation feed as the human
     controller, so bots and player read as the same species. */
  move(dt, dx, dz, speed) {
    this._time += dt;
    const P = GameConfig.player;
    const len = Math.hypot(dx, dz);
    if (len > 1e-6) { dx /= len; dz /= len; } else speed = 0;
    const k = 1 - Math.exp(-(speed > 0 ? P.accel * 0.75 : P.decel * 0.75) * dt);
    this.velocity.x += (dx * speed - this.velocity.x) * k;
    this.velocity.z += (dz * speed - this.velocity.z) * k;

    const pos = this.avatar.root.position;
    pos.x += this.velocity.x * dt;
    pos.z += this.velocity.z * dt;
    this.world.collision.resolvePlayer(pos, P.radius);

    let turn = 0;
    const planar = Math.hypot(this.velocity.x, this.velocity.z);
    if (planar > 0.15) {
      const target = Math.atan2(this.velocity.x, this.velocity.z);
      let d = target - this.facing;
      d = Math.atan2(Math.sin(d), Math.cos(d));
      this.facing += d * Math.min(1, P.turnRate * 0.85 * dt);
      turn = d;
    }
    this.avatar.setFacing(this.facing);

    const wk = 1 - Math.exp(-9 * dt);
    this._w.move += (THREE.MathUtils.clamp(planar / P.walkSpeed, 0, 1) - this._w.move) * wk;
    this._w.run += (THREE.MathUtils.clamp(
      (planar - P.walkSpeed) / (P.runSpeed - P.walkSpeed), 0, 1) - this._w.run) * wk;
    this._phase += planar * dt * 2.15;
    this.avatar.animate(dt, {
      time: this._time, phase: this._phase,
      moveW: this._w.move, runMix: this._w.run,
      airW: 0, land01: 0, turn,
    });
  }

  /* Frozen in place: zero velocity, shivering ice pose. */
  holdFrozen(dt) {
    this._time += dt;
    this.velocity.x = 0;
    this.velocity.z = 0;
    this.avatar.poseFrozen(dt, this._time);
  }

  dispose() {
    this.player._botBody = null;
    this.world.bus.emit('scene:remove-request', this.avatar.root);
    this.avatar.dispose();
  }
}

/* ── src/ai/RunnerAI.js ── */
class RunnerAI {
  constructor(player, body, traits, world) {
    this.player = player;
    this.body = body;
    this.world = world;
    this.traits = traits || { boldness: 0.5, rescueBias: 0.5, stamina: 0.8 };
    this.state = 'Idle';
    this.thinkOffset = 0;
    this._think = Math.random() * 0.2;
    this._stateTime = 0;
    this._idleTimer = 1 + Math.random() * 2;
    this._wanderHeading = Math.random() * Math.PI * 2;
    this._rescueTarget = null;
    this._recentRescues = new Map();   // targetId → clock of last reach attempt
    this._clock = 0;
    this._desired = { x: 0, z: 0 };
    this._speed = 0;
  }

  dispose() { this.body.dispose(); }

  update(dt) {
    this._clock += dt;
    this._stateTime += dt;
    this._think -= dt;
    if (this._think <= 0) {                    // decisions on a desynced tick…
      this._think = GameConfig.ai.thinkInterval * (0.85 + Math.random() * 0.4);
      this._decide();
    }
    this._steer(dt);                           // …steering every frame, for smoothness
    this.body.move(dt, this._desired.x, this._desired.z, this._speed);
  }

  _catcher() {
    const c = this.world.roster.find((p) => p.role === 'chor');
    if (!c) return null;
    const pos = this.world.positionOf(c);
    if (!pos) return null;
    const vel = this.world.velocityOf(c) || { x: 0, z: 0 };
    return { pos, vel };
  }

  _threat() {
    const c = this._catcher();
    if (!c) return Infinity;
    return Math.hypot(this.body.position.x - c.pos.x, this.body.position.z - c.pos.z);
  }

  _fleeRadius() {                              // bold runners let the chor come closer
    return GameConfig.ai.runner.fleeRadius * (1.15 - this.traits.boldness * 0.5);
  }

  _to(state) {
    if (state !== this.state) { this.state = state; this._stateTime = 0; }
  }

  _decide() {
    const threat = this._threat();
    const fleeR = this._fleeRadius();

    if (threat < fleeR) return this._to('Escape');
    if (this.state === 'Escape') {
      if (threat < fleeR * 1.5) return;        // hysteresis: keep running to safety
      return this._to('Wander');
    }

    const rescue = this._bestRescue(threat);
    if (rescue) { this._rescueTarget = rescue; return this._to('Rescue'); }
    if (this.state === 'Rescue') {
      const q = this._rescueTarget;
      if (!q || !this.world.freeze.isFrozen(q.id)) return this._to('Wander');
      return;
    }
    if (this.state === 'Idle' && this._stateTime > this._idleTimer) return this._to('Wander');
    if (this.state === 'Wander' && this._stateTime > 4 + Math.random() * 4 &&
        Math.random() < 0.3) {
      this._idleTimer = 0.8 + Math.random() * 1.8;
      return this._to('Idle');
    }
  }

  /* Closest SAFE rescue: distance to the frozen teammate plus a heavy
     penalty when the catcher guards them; too-guarded targets are
     skipped entirely. (Dormant until the gameplay build freezes anyone.) */
  _bestRescue(threat) {
    const A = GameConfig.ai.runner;
    if (threat < this._fleeRadius() * 1.2) return null;      // not while hunted
    const me = this.body.position;
    const c = this._catcher();
    let best = null, bestScore = Infinity;
    for (const q of this.world.roster) {
      if (q.id === this.player.id || q.role === 'chor') continue;
      if (!this.world.freeze.isFrozen(q.id)) continue;
      // just touched them — give the round logic a beat to thaw before retrying
      if ((this._recentRescues.get(q.id) ?? -9) + 1.5 > this._clock) continue;
      const qp = this.world.positionOf(q);
      if (!qp) continue;
      const dist = Math.hypot(me.x - qp.x, me.z - qp.z);
      let danger = 0;
      if (c) {
        const cd = Math.hypot(c.pos.x - qp.x, c.pos.z - qp.z);
        if (cd < A.guardRadius * 0.55) continue;             // catcher is camping them
        if (cd < A.guardRadius) danger = (1 - cd / A.guardRadius) * 22;
      }
      const score = dist + danger;
      if (score < bestScore) { bestScore = score; best = q; }
    }
    if (best && Math.random() < 0.25 + this.traits.rescueBias * 0.75) return best;
    return null;
  }

  _steer(dt) {
    const A = GameConfig.ai.runner;
    const P = GameConfig.player;
    const pos = this.body.position;
    let dx = 0, dz = 0, speed = 0;

    switch (this.state) {
      case 'Idle':
        break;

      case 'Wander': {
        this._wanderHeading += (Math.random() * 2 - 1) * 2.2 * dt;
        dx = Math.sin(this._wanderHeading);
        dz = Math.cos(this._wanderHeading);
        const cd = Math.hypot(pos.x, pos.z);
        if (cd > A.wanderRadius) {                       // drift back toward the yard
          dx += (-pos.x / cd) * 0.9;
          dz += (-pos.z / cd) * 0.9;
          this._wanderHeading = Math.atan2(dx, dz);
        }
        speed = P.walkSpeed * (0.8 + this.traits.stamina * 0.2);
        break;
      }

      case 'Escape': {
        const c = this._catcher();
        if (!c) { this._to('Wander'); break; }
        // flee the catcher's near-future position, not their shadow
        let fx = pos.x - (c.pos.x + c.vel.x * 0.35);
        let fz = pos.z - (c.pos.z + c.vel.z * 0.35);
        const fl = Math.hypot(fx, fz) || 1;
        fx /= fl; fz /= fl;
        // wall repulsion bends the path off the boundary…
        const wf = Steering.wallField(pos);
        fx += wf.x * 1.7;
        fz += wf.z * 1.7;
        // …and if flee + wall cancel out, we're cornered: take the
        // tangent around the catcher that leads toward open ground.
        if (Math.hypot(fx, fz) < 0.35) {
          let tx = -(pos.z - c.pos.z), tz = (pos.x - c.pos.x);
          if (tx * -pos.x + tz * -pos.z < 0) { tx = -tx; tz = -tz; }
          const tl = Math.hypot(tx, tz) || 1;
          fx = tx / tl; fz = tz / tl;
        }
        dx = fx; dz = fz;
        speed = P.runSpeed * (0.82 + this.traits.stamina * 0.22);
        break;
      }

      case 'Rescue': {
        const q = this._rescueTarget;
        const qp = q ? this.world.positionOf(q) : null;
        if (!qp || !this.world.freeze.isFrozen(q.id)) { this._to('Wander'); break; }
        if (this._threat() < this._fleeRadius() * 0.95) { this._to('Escape'); break; }
        // safest path: seek the teammate while bowing away from the catcher
        let sx = qp.x - pos.x, sz = qp.z - pos.z;
        const dist = Math.hypot(sx, sz) || 1;
        sx /= dist; sz /= dist;
        const c = this._catcher();
        if (c) {
          const rx = pos.x - c.pos.x, rz = pos.z - c.pos.z;
          const rd = Math.hypot(rx, rz) || 1;
          const w = Math.max(0, 1 - rd / A.guardRadius) * 1.3;
          sx += (rx / rd) * w;
          sz += (rz / rd) * w;
        }
        dx = sx; dz = sz;
        speed = P.runSpeed * (0.78 + this.traits.stamina * 0.2) *
                Math.min(1, dist / 1.2 + 0.35);          // arrival slow-down
        if (dist < GameConfig.ai.touchRadius) {
          // dormant gameplay hook — the round logic will thaw on this
          this.world.bus.emit('ai:rescue-reach',
            { rescuerId: this.player.id, targetId: q.id });
          this._recentRescues.set(q.id, this._clock);
          this._rescueTarget = null;
          this._to('Wander');
        }
        break;
      }
    }

    if (speed > 0) {
      const av = Steering.avoid(pos, dx, dz, this.world);
      if (av) { dx += av.x * 1.6 * av.strength; dz += av.z * 1.6 * av.strength; }
    }
    this._desired.x = dx;
    this._desired.z = dz;
    this._speed = speed;
  }
}

/* ── src/ai/CatcherAI.js ── */
class CatcherAI {
  constructor(player, body, traits, world) {
    this.player = player;
    this.body = body;
    this.world = world;
    this.traits = traits || { boldness: 0.5, rescueBias: 0.5, stamina: 0.8 };
    this.state = 'Search';
    this.thinkOffset = 0;
    this._think = Math.random() * 0.2;
    this._target = null;
    this._cooldown = 0;
    this._wanderHeading = Math.random() * Math.PI * 2;
    this._desired = { x: 0, z: 0 };
    this._speed = 0;
  }

  dispose() { this.body.dispose(); }

  update(dt) {
    this._think -= dt;
    this._cooldown = Math.max(0, this._cooldown - dt);
    if (this._think <= 0) {
      this._think = GameConfig.ai.thinkInterval * (0.85 + Math.random() * 0.4);
      this._decide();
    }
    this._steer(dt);
    this.body.move(dt, this._desired.x, this._desired.z, this._speed);
  }

  _candidates() {
    return this.world.roster.filter((q) =>
      q.id !== this.player.id &&
      q.role !== 'chor' &&
      !this.world.freeze.isFrozen(q.id) &&                  // frozen players are ignored
      this.world.positionOf(q));
  }

  /* Lower is better: distance, minus a bonus for runners mid-rescue,
     plus a penalty for runners already sprinting away (hard catches). */
  _cost(q) {
    const A = GameConfig.ai.catcher;
    const me = this.body.position;
    const qp = this.world.positionOf(q);
    let cost = Math.hypot(me.x - qp.x, me.z - qp.z);
    if (this.world.brainStateOf(q) === 'Rescue') cost -= A.rescuePriority;
    const v = this.world.velocityOf(q);
    if (v) {
      const dx = qp.x - me.x, dz = qp.z - me.z;
      const d = Math.hypot(dx, dz) || 1;
      const awaySpeed = (v.x * dx + v.z * dz) / d;          // + = fleeing, − = closing
      cost += Math.max(0, awaySpeed) * 0.55;
    }
    return cost;
  }

  _decide() {
    const A = GameConfig.ai.catcher;
    const list = this._candidates();
    if (!list.length || this._cooldown > 0) {
      this._target = null;
      this.state = 'Search';
      return;
    }
    let best = null, bestCost = Infinity;
    for (const q of list) {
      const c = this._cost(q);
      if (c < bestCost) { bestCost = c; best = q; }
    }
    const current = this._target && list.includes(this._target)
      ? this._cost(this._target) : Infinity;
    // dynamic retargeting with hysteresis — no flip-flopping between two
    // runners — but a rescue attempt always overrides an idle incumbent
    const bestIsRescuer = this.world.brainStateOf(best) === 'Rescue';
    const currentIsRescuer = this._target &&
      this.world.brainStateOf(this._target) === 'Rescue';
    if (current === Infinity ||
        bestCost < current * A.retargetHysteresis ||
        (bestIsRescuer && !currentIsRescuer)) {
      this._target = best;
    }
    const tp = this.world.positionOf(this._target);
    const dist = Math.hypot(this.body.position.x - tp.x, this.body.position.z - tp.z);
    this.state = dist < A.directRadius ? 'Chase' : 'Intercept';
  }

  _steer(dt) {
    const A = GameConfig.ai.catcher;
    const P = GameConfig.player;
    const pos = this.body.position;
    let dx = 0, dz = 0, speed = 0;

    if (this.state === 'Search' || !this._target) {
      this._wanderHeading += (Math.random() * 2 - 1) * 2 * dt;
      dx = Math.sin(this._wanderHeading) - pos.x * 0.03;    // scan drifting to center
      dz = Math.cos(this._wanderHeading) - pos.z * 0.03;
      speed = this._cooldown > 0 ? 0 : P.walkSpeed;
    } else {
      const tp = this.world.positionOf(this._target);
      let aimX = tp.x, aimZ = tp.z;
      if (this.state === 'Intercept') {
        // aim where the runner will be, not where they are
        const v = this.world.velocityOf(this._target) || { x: 0, z: 0 };
        const dist = Math.hypot(tp.x - pos.x, tp.z - pos.z);
        const lead = Math.min(A.maxLead, dist / Math.max(1, P.runSpeed));
        aimX += v.x * lead;
        aimZ += v.z * lead;
      }
      dx = aimX - pos.x;
      dz = aimZ - pos.z;
      speed = P.runSpeed * (0.9 + this.traits.stamina * 0.2);

      const reach = Math.hypot(tp.x - pos.x, tp.z - pos.z);
      if (reach < GameConfig.ai.touchRadius) {
        // dormant gameplay hook — the round logic will freeze on this
        this.world.bus.emit('ai:tag-reach',
          { catcherId: this.player.id, targetId: this._target.id });
        this._cooldown = A.tagCooldown;
        this._target = null;
        this.state = 'Search';
      }
    }

    if (speed > 0) {
      const av = Steering.avoid(pos, dx, dz, this.world);
      if (av) { dx += av.x * 1.5 * av.strength; dz += av.z * 1.5 * av.strength; }
      const wf = Steering.wallField(pos);
      dx += wf.x * 0.8;
      dz += wf.z * 0.8;
    }
    this._desired.x = dx;
    this._desired.z = dz;
    this._speed = speed;
  }
}
</script>

<script>
/* ════════════════════════════════════════════════════════════
   src/systems/RoundSystem.js                            (v0.6.0)
   The rules of Borof Pani. Owns the match clock, resolves every
   touch (human catcher/rescuer by proximity; bot touches through
   the AI's 'ai:tag-reach' / 'ai:rescue-reach' hooks from v0.5),
   applies ice shells + sounds, and decides the round:
     · every runner frozen  → the catcher wins immediately
     · clock reaches zero   → the runners win
   The FreezeSystem ledger from v0.1 remains the single source of
   truth for who is frozen.
   ════════════════════════════════════════════════════════════ */
class RoundSystem {
  constructor(game) {
    this.game = game;
    this.active = false;
    this.timeLeft = 0;
    this._tickAcc = 0;
    this._shells = new Map();          // playerId → ice shell mesh
    this.freezeCount = 0;               // successful freezes this round
    this.rescueCount = 0;               // successful rescues this round

    game.bus.on('ai:tag-reach', ({ catcherId, targetId }) => {
      if (this.active) this._tryFreeze(targetId, catcherId);
    });
    game.bus.on('ai:rescue-reach', ({ rescuerId, targetId }) => {
      if (!this.active) return;
      if (this.game.freeze.isFrozen(rescuerId)) return;   // frozen can't rescue
      this._tryThaw(targetId, rescuerId);
    });
    game.bus.on('freeze:all-frozen', () => {
      if (this.active) this.end('catcher');               // instant win
    });
    game.bus.on('locale:changed', () => {
      const match = game.manager.match;
      if (!match) return;
      for (const p of match.roster) {
        const av = this._avatarInstanceOf(p);
        if (av) av._redrawLabel();
      }
    });
  }

  begin() {
    const g = this.game, match = g.manager.match;
    if (!match) return;
    this.cleanup();
    g.freeze.beginRound(g.players.runnerIds());
    this.active = true;
    this.timeLeft = GameConfig.round.duration;
    this._tickAcc = 0;
    this.freezeCount = 0;
    this.rescueCount = 0;
    const chor = match.roster.find((p) => p.role === 'chor');
    for (const p of match.roster) {
      const av = this._avatarInstanceOf(p);
      if (av) av.setLabelState({ isCatcher: p.role === 'chor', isFrozen: false });
    }
    g.bus.emit('round:started', {
      catcherName: chor ? chor.name : '?',
      humanIsCatcher: !!(chor && chor.isHuman),
      total: match.roster.length - 1,
    });
    this._emitTick();
  }

  /* The PlayerAvatar instance behind any roster entry, human or bot —
     the one place that knows how to find either. */
  _avatarInstanceOf(p) {
    return p.isHuman ? this.game.playerController.avatar : this.game.players.getAvatarInstance(p.id);
  }

  update(dt) {
    if (!this.active || !this.game.state.is(GameState.PLAYING)) return;
    this.timeLeft = Math.max(0, this.timeLeft - dt);
    this._touchChecks();
    this._tickAcc += dt;
    if (this._tickAcc >= 0.2) { this._tickAcc = 0; this._emitTick(); }
    if (this.active && this.timeLeft <= 0) this.end('runners');
  }

  _emitTick() {
    const match = this.game.manager.match;
    const total = match ? match.roster.length - 1 : 0;
    const frozen = this.game.freeze.frozenCount();
    this.game.bus.emit('round:tick', {
      timeLeft: this.timeLeft,
      frozen, total,
      active: total - frozen,
      rescues: this.rescueCount,
      freezes: this.freezeCount,
    });
  }

  /* The human's touches: freeze as catcher, rescue as free runner. */
  _touchChecks() {
    const g = this.game, match = g.manager.match;
    if (!match || !g.playerController.object3d) return;
    const human = match.roster.find((p) => p.isHuman);
    if (!human) return;
    const hp = g.playerController.object3d.position;
    const R = GameConfig.round.humanTouchRadius;
    if (human.role === 'chor') {
      for (const q of match.roster) {
        if (q.isHuman || q.role === 'chor' || g.freeze.isFrozen(q.id)) continue;
        const qp = q.avatar ? q.avatar.position : null;
        if (qp && Math.hypot(hp.x - qp.x, hp.z - qp.z) < R) {
          this._tryFreeze(q.id, human.id);
        }
      }
    } else if (!g.freeze.isFrozen(human.id)) {
      for (const q of match.roster) {
        if (q.isHuman || !g.freeze.isFrozen(q.id)) continue;
        const qp = q.avatar ? q.avatar.position : null;
        if (qp && Math.hypot(hp.x - qp.x, hp.z - qp.z) < R) {
          this._tryThaw(q.id, human.id);
        }
      }
    }
  }

  _rosterOf(id) {
    const match = this.game.manager.match;
    return match ? match.roster.find((x) => x.id === id) || null : null;
  }

  _rootOf(p) {
    return p.isHuman ? this.game.playerController.object3d : p.avatar;
  }

  _tryFreeze(id, byId) {
    const g = this.game;
    const p = this._rosterOf(id);
    if (!p || p.role !== 'runner') return;               // the chor never freezes
    if (!g.freeze.freeze(id, byId)) return;              // ledger decides
    const root = this._rootOf(p);
    if (root) {
      const shell = new THREE.Mesh(
        new THREE.BoxGeometry(0.78, 1.52, 0.66),
        g.freeze.getIceMaterial());                      // the v0.1 ice material, at last
      shell.position.y = 0.76;
      root.add(shell);
      this._shells.set(id, shell);
    }
    if (p.isHuman) g.playerController.frozen = true;     // no moving, jumping, sprinting
    const av = this._avatarInstanceOf(p);
    if (av) av.setLabelState({ isFrozen: true });
    this.freezeCount++;
    g.audio.sfxFreeze();
    this._emitTick();
  }

  _tryThaw(id, byId) {
    const g = this.game;
    if (!g.freeze.thaw(id, byId)) return;
    this._removeShell(id);
    const p = this._rosterOf(id);
    if (p && p.isHuman) g.playerController.frozen = false;
    if (p) { const av = this._avatarInstanceOf(p); if (av) av.setLabelState({ isFrozen: false }); }
    this.rescueCount++;
    g.audio.sfxRescue();
    this._emitTick();
  }

  _removeShell(id) {
    const shell = this._shells.get(id);
    if (!shell) return;
    if (shell.parent) shell.parent.remove(shell);
    shell.geometry.dispose();
    this._shells.delete(id);
  }

  end(winner) {
    if (!this.active) return;
    this.active = false;
    const g = this.game, match = g.manager.match;
    const chor = match ? match.roster.find((p) => p.role === 'chor') : null;
    const humanIsCatcher = !!(chor && chor.isHuman);
    const humanWon = winner === 'catcher' ? humanIsCatcher : !humanIsCatcher;
    // announce before the state flips so the end screen has its result
    g.bus.emit('round:ended', {
      winner, humanWon, catcherName: chor ? chor.name : '?',
    });
    g.state.setState(GameState.ROUND_END);   // AI + controller input stop here
    if (document.exitPointerLock) {
      try { document.exitPointerLock(); } catch (_) { /* no lock held */ }
    }
  }

  cleanup() {
    this.active = false;
    for (const id of [...this._shells.keys()]) this._removeShell(id);
    this.game.freeze.reset();
    this.game.playerController.frozen = false;
  }
}

/* ════════════════════════════════════════════════════════════
   src/ui/screens/LotteryScreen.js
   The counting-out ceremony for the LOTTERY state: steps through
   the elimination rounds the LotterySystem recorded in v0.1,
   reveals the chor ("You are the Catcher!" when it's you), then
   runs the 3-second countdown and hands off to beginRound().
   ════════════════════════════════════════════════════════════ */
class LotteryScreen extends Screen {
  constructor(game) {
    super(game, 'screen-lottery');
    this._seq = 0;
  }

  build() {
    const col = document.createElement('div');
    col.className = 'lot-col';
    this._rhyme = document.createElement('div');
    this._rhyme.className = 'lot-rhyme';
    this._chipsEl = document.createElement('div');
    this._chipsEl.className = 'roster-chips lot-chips';
    this._line = document.createElement('div');
    this._line.className = 'lot-line';
    this._count = document.createElement('div');
    this._count.className = 'lot-count';
    col.append(this._rhyme, this._chipsEl, this._line, this._count);
    this.el.appendChild(col);
  }

  enter() { this._seq++; this._run(this._seq); }
  exit() { this._seq++; }                       // cancels any pending steps

  _delay(ms, seq) {
    return new Promise((res) => setTimeout(() => res(seq === this._seq), ms));
  }

  async _run(seq) {
    const g = this.game, match = g.manager.match;
    if (!match) return;
    const lot = match.lottery;
    this._rhyme.textContent = lot.mode === 'rhyme' ? lot.rhymeText : '';
    this._line.textContent = '';
    this._count.textContent = '';

    const chipOf = {};
    this._chipsEl.innerHTML = '';
    for (const p of match.roster) {
      const s = document.createElement('span');
      const hex = '#' + p.color.toString(16).padStart(6, '0');
      s.innerHTML = `<i style="--dot:${hex}"></i>${p.name}`;
      if (p.isHuman) s.classList.add('is-you');
      this._chipsEl.appendChild(s);
      chipOf[p.id] = s;
    }
    if (!(await this._delay(700, seq))) return;

    for (const round of lot.rounds) {           // the rhyme walks the ring
      const out = match.roster.find((p) => p.id === round.eliminatedId);
      chipOf[round.eliminatedId].classList.add('is-out');
      this._line.textContent = L10N.t('isOut', { name: out ? out.name : '?' });
      g.audio.uiHover();
      if (!(await this._delay(430, seq))) return;
    }

    const chor = match.roster.find((p) => p.id === lot.chorId);
    if (chipOf[lot.chorId]) chipOf[lot.chorId].classList.add('is-chor');
    this._line.textContent = chor && chor.isHuman
      ? L10N.t('youAreCatcher')
      : L10N.t('nameIsCatcher', { name: chor ? chor.name : '?' });
    g.audio.uiConfirm();
    if (!(await this._delay(1500, seq))) return;

    for (const n of [3, 2, 1]) {                // the 3-second countdown
      this._count.textContent = L10N.digit(n);
      g.audio.sfxCountdown();
      if (!(await this._delay(1000, seq))) return;
    }
    this._count.textContent = L10N.t('go');
    g.audio.uiConfirm();
    if (!(await this._delay(400, seq))) return;
    g.manager.beginRound();
  }
}

/* ════════════════════════════════════════════════════════════
   src/ui/screens/EndScreen.js
   Victory / Game Over for the ROUND_END state: the human's
   outcome up top, the winning side beneath, the chor named, and
   Restart / Return to Main Menu. Fully trilingual through the
   packs — including live re-render if the language changes here.
   ════════════════════════════════════════════════════════════ */
class EndScreen extends Screen {
  constructor(game) {
    super(game, 'screen-end');
    this._result = null;
  }

  build() {
    this._kicker = document.createElement('div');
    this._kicker.className = 'eyebrow';
    this._title = document.createElement('div');
    this._title.className = 'end-title';
    this._side = document.createElement('div');
    this._side.className = 'end-side';
    this._chor = document.createElement('div');
    this._chor.className = 'end-chor';

    const panel = document.createElement('div');
    panel.className = 'pause-panel';
    const restartBtn = this.btn('restart', { primary: true });
    restartBtn.addEventListener('click', () => {
      this.game.audio.uiConfirm();
      this.game.manager.restartMatch();
    });
    const menuBtn = this.btn('mainMenu', { ghost: true });
    menuBtn.addEventListener('click', () => {
      this.game.audio.uiBack();
      this.game.state.setState(GameState.MAIN_MENU);
    });
    panel.append(restartBtn, menuBtn);

    this.el.append(this._kicker, this._title, this._side, this._chor, panel);
    this.game.bus.on('round:ended', (r) => { this._result = r; });
    this.game.bus.on('locale:changed', () => this._render());
  }

  enter() { this._render(); }

  _render() {
    const r = this._result;
    if (!r) return;
    this._kicker.textContent = r.humanWon ? L10N.t('victory') : L10N.t('gameOver');
    this._title.textContent = r.humanWon ? L10N.t('youWin') : L10N.t('youLose');
    this._title.classList.toggle('win', r.humanWon);
    this._title.classList.toggle('lose', !r.humanWon);
    this._side.textContent = r.winner === 'catcher'
      ? L10N.t('catcherWins') : L10N.t('runnersWin');
    this._chor.textContent = L10N.t('catcher') + ': ' + r.catcherName;
  }
}
</script>

<script>
/* ════════════════════════════════════════════════════════════
   src/managers/GameManager.js
   High-level match orchestration. Owns the current match record
   and sequences the pre-game pipeline:
   roster → lottery → chor assignment → (gameplay build: spawn,
   LOTTERY ceremony state, then PLAYING).
   ════════════════════════════════════════════════════════════ */
class GameManager {
  constructor(game) {
    this.game = game;
    this.match = null;     // { playerCount, roster, lottery, createdAt }
  }

  prepareMatch(playerCount) {
    const { state, players, lottery, freeze, bus } = this.game;

    // allow re-preparing while already reviewing a prepared match
    if (!state.is(GameState.MATCH_SETUP) &&
        !state.setState(GameState.MATCH_SETUP)) return null;

    const roster = players.createRoster(playerCount);
    const draw = lottery.draw(roster.map((p) => p.id));
    players.assignChor(draw.chorId);
    freeze.beginRound(players.runnerIds());

    this.match = { playerCount, roster, lottery: draw, createdAt: Date.now() };
    bus.emit('match:prepared', this.match);
    return this.match;
  }

  /* Player-controller build: step through the state table into the
     world. The LOTTERY ceremony animates in the gameplay build; for
     now it is an instant pass-through the FSM already allows. */
  enterPlayground() {
    const g = this.game, st = g.state;
    if (!st.is(GameState.MATCH_SETUP) || !this.match) return;
    g.players.spawnRoster();                    // everyone stands in the ring…
    const human = this.match.roster.find((p) => p.isHuman);
    g.playerController.spawnIfNeeded(human ? human.color : 0xe8a33d, human ? human.name : undefined);
    st.setState(GameState.LOTTERY);             // …and the counting-out begins
    g.input.requestPointerLock();               // grabbed inside the click gesture
  }

  /* Called by the LotteryScreen when its countdown hits Go. */
  beginRound() {
    const g = this.game, st = g.state;
    if (!st.is(GameState.LOTTERY) || !this.match) return;
    st.setState(GameState.PLAYING);             // follow camera + input via wiring
    const human = this.match.roster.find((p) => p.isHuman);
    if (human) human.avatar = g.playerController.object3d;   // AI can perceive you
    g.ai.activate(this.match.roster, this._buildAIWorld());
    g.round.begin();
  }

  /* Fresh lottery, fresh positions, same roster — straight back into
     the ceremony. Wired to the end screen's Restart button. */
  restartMatch() {
    const g = this.game, st = g.state;
    if (!st.is(GameState.ROUND_END) || !this.match) return;
    g.round.cleanup();
    g.ai.deactivate();                          // bot bodies + avatars retire…
    const draw = g.lottery.draw(this.match.roster.map((p) => p.id));
    g.players.assignChor(draw.chorId);
    this.match.lottery = draw;
    g.players.spawnRoster();                    // …and return to the ring
    g.playerController.resetToSpawn();
    st.setState(GameState.LOTTERY);
    g.input.requestPointerLock();
  }

  /* One accessor object is the AI's whole view of the game — future
     gameplay systems extend this instead of rewiring the brains. */
  _buildAIWorld() {
    const g = this.game;
    return {
      bus: g.bus,
      collision: g.collision,
      freeze: g.freeze,
      roster: this.match.roster,
      avatarInstanceOf: (p) => g.players.getAvatarInstance(p.id),
      positionOf: (p) => (p.isHuman
        ? (g.playerController.object3d ? g.playerController.object3d.position : null)
        : (p.avatar ? p.avatar.position : null)),
      velocityOf: (p) => (p.isHuman
        ? g.playerController.velocity
        : (p._botBody ? p._botBody.velocity : null)),
      humanPosition: () => (g.playerController.object3d
        ? g.playerController.object3d.position : null),
    };
  }

  /* The pipeline declared in v0.1 — spawnRoster() → LOTTERY ceremony
     → PLAYING — now fully real: enterPlayground() kicks the ceremony
     and beginRound() completes it. The last stub in the project closes. */
  startMatch() { this.enterPlayground(); }

  abandonMatch() {
    this.game.players.disposeRoster();
    this.game.freeze.reset();
    this.game.ai.reset();
    this.match = null;
  }
}

/* ════════════════════════════════════════════════════════════
   src/core/GameLoop.js
   Fixed-timestep simulation (accumulator pattern) with rendering
   every animation frame. Pauses cleanly when the tab is hidden;
   clamps pathological frame deltas so the sim never spirals.
   ════════════════════════════════════════════════════════════ */
class GameLoop {
  constructor({ update, render }) {
    this._update = update;
    this._render = render;
    this._running = false;
    this._accumulator = 0;
    this._lastTime = 0;
    this._rafId = 0;

    // FPS meter bookkeeping
    this._fpsFrames = 0;
    this._fpsWindowStart = 0;
    this._fpsEl = document.getElementById('fps-meter');

    this._tick = this._tick.bind(this);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) this.stop();
      else if (!this._running) this.start();
    });
  }

  start() {
    if (this._running) return;
    this._running = true;
    this._lastTime = performance.now();
    this._fpsWindowStart = this._lastTime;
    this._rafId = requestAnimationFrame(this._tick);
  }

  stop() {
    this._running = false;
    cancelAnimationFrame(this._rafId);
  }

  _tick(now) {
    if (!this._running) return;
    const step = GameConfig.loop.fixedStep;
    let frameDelta = (now - this._lastTime) / 1000;
    this._lastTime = now;
    if (frameDelta > GameConfig.loop.maxFrameDelta) {
      frameDelta = GameConfig.loop.maxFrameDelta;   // tab was throttled; don't catch up forever
    }

    this._accumulator += frameDelta;
    while (this._accumulator >= step) {
      this._update(step);
      this._accumulator -= step;
    }
    this._render(this._accumulator / step);         // interpolation alpha for future use

    this._fpsFrames++;
    if (now - this._fpsWindowStart >= 500) {
      const fps = Math.round(this._fpsFrames / ((now - this._fpsWindowStart) / 1000));
      this._fpsEl.textContent = fps + ' FPS';
      this._fpsFrames = 0;
      this._fpsWindowStart = now;
    }

    this._rafId = requestAnimationFrame(this._tick);
  }
}

/* ════════════════════════════════════════════════════════════
   src/core/Game.js  +  src/main.js
   Composition root. Constructs every manager in dependency order,
   wires the loop, registers assets and screens, then boots:
   BOOT → LOADING → (assets) → MAIN_MENU.
   ════════════════════════════════════════════════════════════ */
class Game {
  constructor() {
    this.bus = new EventBus();
    this.state = new GameStateManager(this.bus);
    L10N.init(this.bus);                 // restore saved language before any screen builds

    // rendering stack
    this.sceneManager = new SceneManager(this.bus, document.getElementById('game-canvas-host'));
    this.lighting = new LightingSystem(this.bus, this.sceneManager);
    this.cameraController = new CameraController(this.bus);
    this.input = new InputManager(this.bus, this.sceneManager.renderer.domElement);
    this.collision = new CollisionSystem();
    this.cameraController.setCollision(this.collision);

    // content + systems
    this.assets = new AssetLoader(this.bus);
    this.environment = new EnvironmentManager(this.bus, this.sceneManager, this.assets);
    this.audio = new AudioManager(this.bus);
    this.freeze = new FreezeSystem(this.bus);
    this.lottery = new LotterySystem(this.bus);
    this.players = new PlayerManager(this.bus);
    this.ai = new AIManager(this.bus, this.state);
    this.manager = new GameManager(this);
    this.playerController = new PlayerController(this);
    this.round = new RoundSystem(this);

    // UI
    this.ui = new UIManager(this.bus, document.getElementById('ui-root'));
    this.ui.register(GameState.LOADING, new LoadingScreen(this));
    this.ui.register(GameState.MAIN_MENU, new MainMenuScreen(this));
    this.ui.register(GameState.SETTINGS, new SettingsScreen(this));
    const playerSelect = new PlayerCountScreen(this);
    this.ui.register(GameState.PLAYER_SELECT, playerSelect);
    this.ui.alias(GameState.MATCH_SETUP, playerSelect);   // ready panel lives on the same screen
    this.ui.register(GameState.PLAYING, new HUDScreen(this));
    this.ui.register(GameState.PAUSED, new PauseScreen(this));
    this.ui.register(GameState.LOTTERY, new LotteryScreen(this));
    this.ui.register(GameState.ROUND_END, new EndScreen(this));

    // deferred scene mounts/removals requested over the bus (roster lifecycle)
    this.bus.on('scene:add-request', (obj) => this.sceneManager.add(obj));
    this.bus.on('scene:remove-request', (obj) => this.sceneManager.remove(obj));

    // a prepared-but-unplayed match is discarded when the player heads home
    this.bus.on('state:changed', ({ from, to }) => {
      if (from === GameState.MATCH_SETUP && to === GameState.MAIN_MENU) {
        this.manager.abandonMatch();
      }
      if (to === GameState.PLAYING) {
        // Enable control FIRST and unconditionally: nothing downstream in
        // this handler should be able to leave the human unable to move.
        this.input.setEnabled(true);
        const human = this.manager.match
          ? this.manager.match.roster.find((p) => p.isHuman) : null;
        this.playerController.spawnIfNeeded(human ? human.color : 0xe8a33d, human ? human.name : undefined);
        this.cameraController.beginFollow(this.playerController.object3d);
        // Pointer lock was already requested inside the original click in
        // GameManager.enterPlayground(); by the time LOTTERY finishes and we
        // arrive here (via an async timer chain, not a user gesture), a
        // second requestPointerLock() call has no browser-gesture backing —
        // re-issuing it here only risks the browser rejecting or briefly
        // cycling the existing lock. The lock already held is left alone.
      }
      if (from === GameState.PLAYING && to === GameState.PAUSED) {
        this.input.setEnabled(false);
      }
      if (to === GameState.MAIN_MENU &&
          (from === GameState.PAUSED || from === GameState.PLAYING ||
           from === GameState.ROUND_END || from === GameState.LOTTERY)) {
        this.round.cleanup();
        this.playerController.despawn();
        this.manager.abandonMatch();
        this.input.setEnabled(false);
        this.cameraController.setMode(CameraMode.MENU_ORBIT);
      }
    });
    // Esc releases pointer lock → pause; resuming re-locks from the click
    this.bus.on('input:pointerlock', ({ locked }) => {
      if (!locked && this.state.is(GameState.PLAYING)) {
        this.state.setState(GameState.PAUSED);
      }
    });

    this.loop = new GameLoop({
      update: (dt) => this._update(dt),
      render: () => this.sceneManager.render(this.cameraController.camera),
    });
  }

  _update(dt) {
    this.playerController.update(dt);    // input → physics → camera feed
    this.cameraController.update(dt);
    this.environment.update(dt);
    this.freeze.update(dt);
    this.ai.update(dt);
    this.round.update(dt);               // clock, touches, win conditions
  }

  async boot() {
    this.state.setState(GameState.LOADING);
    this.loop.start();                       // loading screen renders over a live loop

    this.environment.registerAssets();
    this.assets.register('mat:ice-shell', 'বরফের খোলস · ice shell material',
      async () => this.freeze.getIceMaterial());

    await this.assets.loadAll();
    this.environment.build();

    // a brief beat so the finished bar is readable, then into the courtyard
    await new Promise((r) => setTimeout(r, 550));
    this.state.setState(GameState.MAIN_MENU);
  }
}

/* ── src/main.js ── */
window.addEventListener('DOMContentLoaded', () => {
  const game = new Game();
  window.__borofPani = game;                 // dev handle for console inspection
  game.boot().catch((err) => console.error('[BorofPani] boot failed:', err));
});
</script>
